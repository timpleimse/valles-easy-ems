<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valles EASY EMS</title>
<style>
  :root{
    --bg:#F4F6FA;
    --card:#FFFFFF;
    --ink:#1C2430;
    --ink-soft:#4A5468;
    --muted:#8A93A6;
    --rule:#E4E8EF;
    --accent:#5B6CF9;
    --accent-soft:#EDEFFF;
    --good:#1F9D63;
    --good-soft:#E6F7EE;
    --bad:#E5483F;
    --bad-soft:#FDEBEA;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --radius: 12px;
    /* dashboard gradient palette, mirrors reference screenshot */
    --g-blue: linear-gradient(135deg,#3E7BFA,#2455D8);
    --g-orange: linear-gradient(135deg,#F79433,#E1631C);
    --g-green: linear-gradient(135deg,#33B36B,#1D8E51);
    --g-purple: linear-gradient(135deg,#9B63E8,#7635CE);
    --g-red: linear-gradient(135deg,#EB5A50,#C6352A);
    --g-amber: linear-gradient(135deg,#F5A623,#D6810C);
    --g-teal: linear-gradient(135deg,#1FB6A6,#0D8C7F);
    --g-pink: linear-gradient(135deg,#EE6FA6,#D1447F);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:14px;}
  a{color:inherit;}

  /* Top bar */
  .topnav{background:#fff;border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:20;}
  .topnav-inner{display:flex;align-items:center;gap:6px;padding:0 20px;max-width:1400px;margin:0 auto;overflow-x:auto;}
  .brand{display:flex;align-items:center;gap:9px;padding:14px 14px 14px 0;margin-right:6px;border-right:1px solid var(--rule);}
  .brand-logo{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex:0 0 32px;overflow:hidden;}
  .brand-logo img{width:100%;height:100%;object-fit:cover;}
  .brand-name{font-weight:700;font-size:13.5px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
  .brand-sub{font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:600;line-height:1.2;}

  .nav-item{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    padding:10px 14px;border-radius:10px;border:none;background:transparent;color:var(--ink-soft);
    font-size:11.5px;white-space:nowrap;position:relative;min-width:74px;
  }
  .nav-item .ic{font-size:17px;line-height:1;}
  .nav-item:hover{background:#F3F4FA;}
  .nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:700;}
  .nav-item .badge{position:absolute;top:4px;right:8px;background:var(--bad);color:#fff;font-size:9.5px;font-weight:700;border-radius:20px;padding:1px 5px;min-width:14px;text-align:center;}
  .nav-item .badge.amber{background:var(--amber,#E1961A);}

  .main-wrap{max-width:1400px;margin:0 auto;padding:22px 20px 60px;}
  .pageh{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .pageh h1{font-size:23px;margin:0;font-weight:800;letter-spacing:-.01em;}
  .pageh .sub{color:var(--muted);font-size:12.5px;margin-top:2px;}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);padding:20px;box-shadow:0 1px 2px rgba(20,30,50,.03);}
  .card + .card{margin-top:16px;}
  .card h2{font-size:15.5px;margin:0 0 14px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .card h2 .tag{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:4px;letter-spacing:.05em;}

  .grid{display:grid;gap:14px;}
  .grid.cols-2{grid-template-columns:1fr 1fr;}
  .grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
  .grid.cols-4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:900px){.grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr;}}

  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px;}
  @media(max-width:900px){.stat-row{grid-template-columns:1fr 1fr;}}
  .stat{border-radius:16px;padding:20px 20px;color:#fff;position:relative;overflow:hidden;min-height:96px;}
  .stat .n{font-size:30px;font-weight:800;position:relative;}
  .stat .l{font-size:12.5px;margin-top:5px;position:relative;opacity:.95;display:flex;align-items:center;gap:6px;}
  .stat .l .ic{font-size:14px;}

  label{display:block;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
  .field{margin-bottom:12px;}
  .hint{font-size:11px;color:var(--muted);margin-top:5px;}
  input[type=text],input[type=number],input[type=date],input[type=month],input[type=password],input[type=email],input[type=tel],select,textarea{
    width:100%;padding:9px 11px;border:1px solid var(--rule);border-radius:8px;background:#FCFDFE;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
  textarea{resize:vertical;min-height:60px;}
  .checkline{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);text-transform:none;}
  .checkline input{width:auto;}

  .btn{
    display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;border:1px solid transparent;
    font-size:13.5px;font-weight:700;letter-spacing:.01em;background:var(--accent);color:#fff;
  }
  .btn:hover{background:#4658E0;}
  .btn.secondary{background:#fff;color:var(--ink);border-color:var(--rule);}
  .btn.secondary:hover{background:var(--bg);}
  .btn.danger{background:var(--bad);color:#fff;}
  .btn.danger:hover{background:#C63A31;}
  .btn.sm{padding:6px 11px;font-size:12.5px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
    padding:8px 10px;border-bottom:1px solid var(--rule);
  }
  tbody td{padding:10px 10px;border-bottom:1px solid #F0F2F6;vertical-align:middle;}
  tbody tr:hover{background:#FAFBFD;}
  .num-cell{font-family:var(--mono);text-align:right;}

  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em;}
  .pill.good{background:var(--good-soft);color:var(--good);}
  .pill.bad{background:var(--bad-soft);color:var(--bad);}
  .pill.neutral{background:var(--bg);color:var(--ink-soft);}
  .pill.accent{background:var(--accent-soft);color:var(--accent);}

  .empty{text-align:center;padding:44px 20px;color:var(--muted);}
  .empty .icon{font-size:30px;margin-bottom:8px;}
  .empty .cta{margin-top:14px;}

  .overlay{position:fixed;inset:0;background:rgba(20,30,50,.5);display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;z-index:50;}
  .overlay.show{display:flex;}
  .modal{background:var(--card);border-radius:14px;width:100%;max-width:640px;padding:24px;box-shadow:0 20px 50px rgba(20,30,50,.25);}
  .modal.wide{max-width:840px;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .modal-head h3{font-size:18px;margin:0;font-weight:800;}
  .modal-close{background:none;border:none;font-size:20px;color:var(--muted);padding:4px 8px;border-radius:6px;}
  .modal-close:hover{background:var(--bg);}

  .divider{height:1px;background:var(--rule);margin:16px 0;}
  .section-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin:18px 0 10px;font-weight:700;}
  .section-label:first-child{margin-top:0;}

  .search-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .search-bar input,.search-bar select{flex:1;min-width:150px;}

  .lock-screen{max-width:380px;margin:60px auto;text-align:center;}
  .lock-screen .seal{width:56px;height:56px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;}
  .lock-screen p{color:var(--muted);font-size:13px;}

  .file-drop{border:1.5px dashed var(--rule);border-radius:10px;padding:16px;text-align:center;background:var(--bg);cursor:pointer;}
  .file-drop:hover{border-color:var(--accent);}
  .file-chip{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--rule);border-radius:8px;padding:7px 10px;margin-top:6px;font-size:12.5px;}
  .file-chip .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .file-chip button{background:none;border:none;color:var(--bad);font-size:13px;}

  .toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:100;}
  .toast{background:var(--ink);color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;box-shadow:0 8px 20px rgba(0,0,0,.2);animation:slidein .2s ease;}
  .toast.err{background:var(--bad);}
  @keyframes slidein{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  /* Payslip — matches company salary-slip layout */
  .payslip{background:#fff;border:1.5px solid var(--ink);border-radius:4px;padding:26px;}
  .payslip-top{display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:0;}
  .payslip-top .logo{width:66px;height:66px;border-radius:50%;border:2px solid var(--ink);flex:0 0 66px;display:flex;align-items:center;justify-content:center;overflow:hidden;font-weight:800;font-size:22px;}
  .payslip-top .logo img{width:100%;height:100%;object-fit:cover;}
  .payslip-top .conameblock{text-align:center;flex:1;}
  .payslip-top .coname{font-size:19px;font-weight:800;letter-spacing:.01em;}
  .payslip-addr{text-align:center;font-size:11px;color:var(--ink-soft);padding:8px 10px;border-bottom:1px solid var(--ink);}
  .payslip-title{text-align:center;font-size:15px;font-weight:800;padding:9px 0;border-bottom:1px solid var(--ink);letter-spacing:.04em;}
  .pstable{width:100%;border-collapse:collapse;font-size:12.5px;}
  .pstable td{border:1px solid var(--ink);padding:6px 9px;}
  .pstable td.lbl{color:var(--ink-soft);width:19%;font-size:11px;}
  .pstable td.val{font-weight:700;width:31%;}
  .earnhead td{font-weight:800;font-size:13px;background:#F4F6FA;}
  .amtcell{text-align:right;font-family:var(--mono);}
  .totrow td{font-weight:800;background:#F4F6FA;}
  .netrow td{font-weight:800;background:#EAF6EF;color:var(--good);font-size:14px;}
  .payslip-foot{font-size:10.5px;color:var(--muted);padding-top:10px;display:flex;justify-content:space-between;}
  .other-pay-title{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 6px;color:var(--ink-soft);}
  .regime-note{font-size:10px;color:var(--muted);margin-top:10px;line-height:1.6;border-top:1px dashed var(--rule);padding-top:8px;}

  .app-footer{margin:34px 0 8px;padding-top:16px;border-top:1px solid var(--rule);text-align:center;font-size:11.5px;color:var(--muted);line-height:1.9;}
  .app-footer div:first-child{font-weight:600;color:var(--ink-soft);}

  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{position:absolute;left:0;top:0;width:100%;padding:0;margin:0;}
    .no-print{display:none !important;}
  }
</style>
</head>
<body>

<div class="topnav">
  <div class="topnav-inner">
    <div class="brand">
      <div class="brand-logo" id="sbLogo">V</div>
      <div>
        <div class="brand-name" id="sbCompanyName">Valles India Tech Services</div>
        <div class="brand-sub" id="sbProduct">Valles EASY EMS</div>
      </div>
    </div>
    <nav id="navList" style="display:flex;">
      <button class="nav-item" data-tab="dashboard"><span class="ic">🏠</span>Dashboard</button>
      <button class="nav-item" data-tab="employees"><span class="ic">👥</span>Staff</button>
      <button class="nav-item" data-tab="payslips"><span class="ic">💰</span>Payslips</button>
      <button class="nav-item" data-tab="compliance"><span class="ic">🛡️</span>Compliance<span class="badge" id="compBadge" style="display:none;">0</span></button>
      <button class="nav-item" data-tab="backup"><span class="ic">📦</span>Backup</button>
      <button class="nav-item" data-tab="settings"><span class="ic">🔒</span>Settings</button>
    </nav>
  </div>
</div>

<div class="main-wrap">
  <div class="pageh">
    <div>
      <h1 id="topTitle">Dashboard</h1>
      <div class="sub" id="topSub">Overview of employees, payroll and compliance</div>
    </div>
    <div class="btn-row no-print" id="topActions"></div>
  </div>
  <div id="content"></div>
  <footer class="app-footer no-print">
    <div>&copy; 2026 EASY EMS &ndash; Engineering Management System. All rights reserved.</div>
    <div>Powered by IMSE Tech India</div>
    <div>Version 1.0.0</div>
  </footer>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modalBox"></div></div>
<div class="toast-wrap" id="toastWrap"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
/* ============================= LOCAL STORAGE (fast local cache) ============================= */
/* This app is designed to be deployed as a static site (e.g. GitHub Pages), so it has no
   server of its own. All data lives in the browser via localStorage as a working cache,
   and — once you connect Google Drive in Settings — is synced to a JSON file in your own
   Drive account (the durable, off-device copy), plus rotating 5-file backups. See README.md
   for deployment + Drive setup. */
const LS_KEY = 'vallesEasyEmsData_v1';
let LOCAL = null;
function ensureLocal(){
  if(LOCAL) return LOCAL;
  try{ const raw = localStorage.getItem(LS_KEY); LOCAL = raw ? JSON.parse(raw) : {}; }
  catch(e){ LOCAL = {}; }
  if(!LOCAL.compliance) LOCAL.compliance = {};
  return LOCAL;
}
async function getJSON(key, def){
  ensureLocal();
  if(key==='org-profile') return LOCAL.org!=null ? LOCAL.org : def;
  if(key==='employees') return LOCAL.employees!=null ? LOCAL.employees : def;
  if(key==='payslips') return LOCAL.payslips!=null ? LOCAL.payslips : def;
  if(key.indexOf('compliance:')===0){ const v = LOCAL.compliance[key.slice(11)]; return v!=null ? v : def; }
  return def;
}
async function setJSON(key, value){
  ensureLocal();
  if(key==='org-profile') LOCAL.org = value;
  else if(key==='employees') LOCAL.employees = value;
  else if(key==='payslips') LOCAL.payslips = value;
  else if(key.indexOf('compliance:')===0){ LOCAL.compliance[key.slice(11)] = value; }
  try{ localStorage.setItem(LS_KEY, JSON.stringify(LOCAL)); }
  catch(e){ toast('Local save failed — browser storage may be full. Try removing large documents.', true); return false; }
  scheduleDriveSync();
  return true;
}
function buildPayload(){
  return { app:'Valles EASY EMS', version:2, savedAt:new Date().toISOString(),
    org:ORG, employees:EMPLOYEES, payslips:PAYSLIPS, compliance:COMPLIANCE };
}

/* ============================= STATE ============================= */
let ORG = null, EMPLOYEES = [], PAYSLIPS = [], COMPLIANCE = {};
let settingsUnlocked = false;
let activeTab = 'dashboard';

const DEFAULT_ORG = {
  companyName: "Your Company Pvt. Ltd.",
  address: "", tel:"", email:"",
  cin: "", pan: "", tan: "", logo: "",
  bankName: "", bankAccNo: "", bankIFSC: "", bankBranch: "",
  ptSlabs: [ {min:0, max:15000, amount:0}, {min:15001, max:20000, amount:150}, {min:20001, max:1000000000, amount:200} ],
  applyPfCeiling: false, pfCeiling: 15000,
  adminPasswordHash: "", employeeSeq: 1,
  gdrive: { clientId:'', connected:false, folderId:null, fileId:null, backupsFolderId:null, sheetId:null, lastSynced:null, email:'' }
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function money(n){ n = Number(n)||0; return "₹" + n.toLocaleString('en-IN', {maximumFractionDigits:0}); }
function money2(n){ n = Number(n)||0; return "₹" + n.toLocaleString('en-IN', {maximumFractionDigits:2}); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function toast(msg, isErr){
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div'); t.className = 'toast'+(isErr?' err':''); t.textContent = msg;
  wrap.appendChild(t); setTimeout(()=>t.remove(), 3200);
}
async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ============================= LOAD / SAVE ============================= */
async function loadAll(){
  ORG = await getJSON('org-profile', null);
  if(!ORG){ ORG = JSON.parse(JSON.stringify(DEFAULT_ORG)); }
  if(!ORG.gdrive) ORG.gdrive = JSON.parse(JSON.stringify(DEFAULT_ORG.gdrive));
  EMPLOYEES = await getJSON('employees', []);
  // migrate legacy records that still have a flat `salary` object instead of salaryHistory
  EMPLOYEES.forEach(e=>{
    if(!e.salaryHistory){
      e.salaryHistory = [{
        id: uid(), effectiveFrom: (e.doj||'').slice(0,7) || new Date().toISOString().slice(0,7),
        basic:(e.salary&&e.salary.basic)||0, hra:(e.salary&&e.salary.hra)||0,
        childrenEducation:0, otherAllowance:(e.salary&&(e.salary.special+e.salary.other))||0, lta:0, reimbursement:0,
        taxRegime:'new', rentPaidAnnual:0, metroCity:true, declared80C:0, declared80D:0, otherExemptions:0,
        revisedAt:new Date().toISOString(), reason:'Initial structure'
      }];
      delete e.salary;
    }
    if(!e.grade) e.grade='';
    if(!e.pfNumber) e.pfNumber='';
    if(!e.location) e.location='';
    if(!e.division) e.division='';
  });
  PAYSLIPS = await getJSON('payslips', []);
  refreshBrand();
}
async function saveOrg(){ await setJSON('org-profile', ORG); }
async function saveEmployees(){ await setJSON('employees', EMPLOYEES); }
async function savePayslips(){ await setJSON('payslips', PAYSLIPS); }
async function saveCompliance(empId){ await setJSON('compliance:'+empId, COMPLIANCE[empId]||[]); }
async function loadCompliance(empId){
  if(COMPLIANCE[empId]) return COMPLIANCE[empId];
  const arr = await getJSON('compliance:'+empId, []);
  COMPLIANCE[empId] = arr; return arr;
}
function refreshBrand(){
  document.getElementById('sbCompanyName').textContent = ORG.companyName || 'Your Company';
  const logoEl = document.getElementById('sbLogo');
  if(ORG.logo){ logoEl.innerHTML = '<img src="'+ORG.logo+'">'; }
  else { logoEl.textContent = (ORG.companyName||'V').trim().charAt(0).toUpperCase(); }
}

/* ============================= NAV ============================= */
document.getElementById('navList').addEventListener('click', (e)=>{
  const btn = e.target.closest('.nav-item'); if(!btn) return; setTab(btn.dataset.tab);
});
function setTab(tab){
  activeTab = tab;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  const titles = {
    dashboard:['Dashboard','Overview of employees, payroll and compliance'],
    employees:['Staff','Employee records and salary structures'],
    payslips:['Payslips','Generate and print monthly pay slips'],
    compliance:['Compliance','TDS, EPFO, ESIC and PT filings & documents'],
    backup:['Backup & Restore','Export and restore your data'],
    settings:['Settings','Company details — admin only']
  };
  document.getElementById('topTitle').textContent = titles[tab][0];
  document.getElementById('topSub').textContent = titles[tab][1];
  render();
}

/* ============================= MODAL ============================= */
function openModal(html, wide){
  document.getElementById('modalBox').className = 'modal' + (wide?' wide':'');
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); document.getElementById('modalBox').innerHTML=''; }
document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id==='overlay') closeModal(); });

/* ============================= RENDER ROUTER ============================= */
function render(){
  const c = document.getElementById('content'); const actions = document.getElementById('topActions'); actions.innerHTML='';
  if(activeTab==='dashboard') return renderDashboard(c, actions);
  if(activeTab==='employees') return renderEmployees(c, actions);
  if(activeTab==='payslips') return renderPayslips(c, actions);
  if(activeTab==='compliance') return renderCompliance(c, actions);
  if(activeTab==='backup') return renderBackup(c, actions);
  if(activeTab==='settings') return renderSettings(c, actions);
}

/* ============================= SALARY HISTORY HELPERS ============================= */
function currentSalary(emp){ return latestSalaryFor(emp, '9999-12'); }
function latestSalaryFor(emp, period){
  const hist = (emp.salaryHistory||[]).slice().sort((a,b)=> a.effectiveFrom.localeCompare(b.effectiveFrom));
  let chosen = hist[0];
  for(const h of hist){ if(h.effectiveFrom<=period) chosen=h; else break; }
  return chosen;
}
function grossOf(s){ return (s.basic||0)+(s.hra||0)+(s.childrenEducation||0)+(s.otherAllowance||0)+(s.lta||0); }

/* ============================= DASHBOARD ============================= */
function renderDashboard(c, actions){
  const totalEmp = EMPLOYEES.length;

  const payslipsThisMonth = PAYSLIPS.filter(p=>p.period===thisMonth).length;
  const totalPayslips = PAYSLIPS.length;
  let docsCount = 0; Object.values(COMPLIANCE).forEach(arr=> arr.forEach(r=> docsCount += (r.files||[]).length));
  const netThisMonth = PAYSLIPS.filter(p=>p.period===thisMonth).reduce((s,p)=>s+p.netPay,0);
  const oldRegimeCount = EMPLOYEES.filter(e=> currentSalary(e) && currentSalary(e).taxRegime==='old').length;

  c.innerHTML = `
    <div class="stat-row">
      <div class="stat" style="background:var(--g-blue);"><div class="n">${totalEmp}</div><div class="l"><span class="ic">👥</span>Active Employees</div></div>
      <div class="stat" style="background:var(--g-orange);"><div class="n">${payslipsThisMonth}</div><div class="l"><span class="ic">🧾</span>Payslips this month</div></div>
      <div class="stat" style="background:var(--g-green);"><div class="n">${money(netThisMonth)}</div><div class="l"><span class="ic">💵</span>Net Payout this month</div></div>
      <div class="stat" style="background:var(--g-purple);"><div class="n">${docsCount}</div><div class="l"><span class="ic">📎</span>Compliance Docs on File</div></div>
    </div>
    <div class="stat-row">
      <div class="stat" style="background:var(--g-red);"><div class="n">${totalPayslips}</div><div class="l"><span class="ic">📚</span>Total Payslips Issued</div></div>
      <div class="stat" style="background:var(--g-amber);"><div class="n">${oldRegimeCount}</div><div class="l"><span class="ic">📑</span>On Old Tax Regime</div></div>
      <div class="stat" style="background:var(--g-teal);"><div class="n">${totalEmp-oldRegimeCount}</div><div class="l"><span class="ic">📗</span>On New Tax Regime</div></div>
      <div class="stat" style="background:var(--g-pink);"><div class="n">${Object.keys(COMPLIANCE).length}</div><div class="l"><span class="ic">🗂️</span>Employees with Filings</div></div>
    </div>
    <div class="grid cols-2">
      <div class="card">
        <h2>Recently Added Employees</h2>
        ${EMPLOYEES.length ? '<table><thead><tr><th>Name</th><th>Designation</th><th>Joined</th></tr></thead><tbody>'+
          EMPLOYEES.slice().sort((a,b)=> (b.doj||'').localeCompare(a.doj||'')).slice(0,5).map(e=>`
          <tr><td>${esc(e.name)}</td><td>${esc(e.designation||'—')}</td><td>${esc(e.doj||'—')}</td></tr>`).join('')+
          '</tbody></table>' : '<div class="empty"><div class="icon">🗂️</div>No employees on record yet.</div>'}
      </div>
      <div class="card">
        <h2>Recent Payslips</h2>
        ${PAYSLIPS.length ? '<table><thead><tr><th>Employee</th><th>Period</th><th class="num-cell">Net Pay</th></tr></thead><tbody>'+
          PAYSLIPS.slice().reverse().slice(0,5).map(p=>`
          <tr><td>${esc(p.empName)}</td><td>${esc(p.period)}</td><td class="num-cell">${money(p.netPay)}</td></tr>`).join('')+
          '</tbody></table>' : '<div class="empty"><div class="icon">🧾</div>No payslips generated yet.</div>'}
      </div>
    </div>
  `;
}

/* ============================= EMPLOYEES ============================= */
function renderEmployees(c, actions){
  actions.innerHTML = `<button class="btn" id="addEmpBtn">+ Add Employee</button>`;
  actions.querySelector('#addEmpBtn').onclick = ()=> openEmployeeForm(null);
  c.innerHTML = `<div class="card"><div class="search-bar"><input type="text" id="empSearch" placeholder="Search by name, ID, designation, department…"></div><div id="empTableWrap"></div></div>`;
  function draw(filter){
    const f = (filter||'').toLowerCase();
    const list = EMPLOYEES.filter(e => !f || [e.name,e.empCode,e.designation,e.department].some(v=>(v||'').toLowerCase().includes(f)));
    const wrap = document.getElementById('empTableWrap');
    if(!list.length){ wrap.innerHTML = '<div class="empty"><div class="icon">🗂️</div>No employees found.<div class="cta"><button class="btn" id="emptyAddBtn">+ Add Employee</button></div></div>';
      const b = wrap.querySelector('#emptyAddBtn'); if(b) b.onclick = ()=>openEmployeeForm(null); return; }
    wrap.innerHTML = `<table><thead><tr><th>ID</th><th>Name</th><th>Designation</th><th>Department</th><th>Regime</th><th class="num-cell">Gross / mo</th><th></th></tr></thead><tbody>
      ${list.map(e=>{
        const s = currentSalary(e); const gross = grossOf(s);
        return `<tr>
          <td><span class="pill neutral">${esc(e.empCode)}</span></td>
          <td>${esc(e.name)}</td>
          <td>${esc(e.designation||'—')}</td>
          <td>${esc(e.department||'—')}</td>
          <td><span class="pill ${s.taxRegime==='old'?'bad':'good'}">${s.taxRegime==='old'?'Old':'New'}</span></td>
          <td class="num-cell">${money(gross)}</td>
          <td><div class="btn-row">
            <button class="btn secondary sm" data-view="${e.id}">View</button>
            <button class="btn secondary sm" data-edit="${e.id}">Edit</button>
            <button class="btn danger sm" data-del="${e.id}">Delete</button>
          </div></td>
        </tr>`;
      }).join('')}
    </tbody></table>`;
    wrap.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>viewEmployee(b.dataset.view));
    wrap.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEmployeeForm(b.dataset.edit));
    wrap.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>deleteEmployee(b.dataset.del));
  }
  draw('');
  document.getElementById('empSearch').addEventListener('input', (e)=>draw(e.target.value));
}

  return {
    id: uid(), empCode: code, name:'', designation:'', department:'', grade:'', location:'', division:'',
    doj:'', dob:'', gender:'', phone:'', email:'', address:'', pan:'', aadhaar:'', uan:'', pfNumber:'', esicNo:'',

function wireRegimeToggle(scope){
  const sel = scope.querySelector('.regimeSel'); const block = scope.querySelector('[data-oldblock]');
  if(!sel||!block) return;
  sel.addEventListener('change', ()=>{ block.style.display = sel.value==='old' ? 'grid' : 'none'; });
}
function readSalaryFields(fd){
  return {
    basic:Number(fd.get('basic'))||0, hra:Number(fd.get('hra'))||0, childrenEducation:Number(fd.get('childrenEducation'))||0,
    otherAllowance:Number(fd.get('otherAllowance'))||0, lta:Number(fd.get('lta'))||0, reimbursement:Number(fd.get('reimbursement'))||0,
    taxRegime: fd.get('taxRegime')||'new', rentPaidAnnual:Number(fd.get('rentPaidAnnual'))||0, metroCity: fd.get('metroCity')==='true',
    declared80C:Number(fd.get('declared80C'))||0, declared80D:Number(fd.get('declared80D'))||0, otherExemptions:Number(fd.get('otherExemptions'))||0
  };
}

function deleteEmployee(empId){
  const e = EMPLOYEES.find(x=>x.id===empId); if(!e) return;
  openModal(`
    <div class="modal-head"><h3>Delete Employee</h3><button class="modal-close" id="mClose">✕</button></div>
    <p>Are you sure you want to delete <b>${esc(e.name)}</b> (${esc(e.empCode)})? This also removes their compliance documents and salary history, and cannot be undone.</p>
    <div class="btn-row"><button class="btn danger" id="confirmDel">Delete Permanently</button><button class="btn secondary" id="mCancel">Cancel</button></div>
  `);
  document.getElementById('mClose').onclick = closeModal; document.getElementById('mCancel').onclick = closeModal;
  document.getElementById('confirmDel').onclick = async ()=>{
    EMPLOYEES = EMPLOYEES.filter(x=>x.id!==empId); await saveEmployees();
    await sDel('compliance:'+empId); delete COMPLIANCE[empId];
    closeModal(); toast('Employee deleted.'); render();
  };
}

    <div class="grid cols-3">

      <div><label>Grade</label><div>${esc(e.grade||'—')}</div></div>
      <div><label>Location</label><div>${esc(e.location||'—')}</div></div>
      <div><label>Division</label><div>${esc(e.division||'—')}</div></div>
      <div><label>Joined</label><div>${esc(e.doj||'—')}</div></div>
      <div><label>PAN</label><div>${esc(e.pan||'—')}</div></div>
      <div><label>UAN / PF No.</label><div>${esc(e.uan||'—')} / ${esc(e.pfNumber||'—')}</div></div>
      <div><label>Bank</label><div>${esc(e.bankName||'—')} ${e.bankAccNo?('· '+esc(e.bankAccNo)):''}</div></div>
      <div><label>Tax Regime</label><div><span class="pill ${s.taxRegime==='old'?'bad':'good'}">${s.taxRegime==='old'?'Old Regime':'New Regime'}</span></div></div>
      <div><label>Gross Monthly</label><div><b>${money(gross)}</b></div></div>
    </div>

    <div class="section-label" style="display:flex;align-items:center;justify-content:space-between;">
      <span>Salary History (Audit Trail)</span>
      <button class="btn sm" id="reviseSalaryBtn" type="button">↻ Revise Salary</button>
    </div>
    <table><thead><tr><th>Effective From</th><th>Basic</th><th>HRA</th><th>Gross</th><th>Regime</th><th>Revised</th><th>Reason</th></tr></thead><tbody>
      ${hist.map(h=>`<tr>
        <td>${esc(h.effectiveFrom)}</td><td class="num-cell">${money(h.basic)}</td><td class="num-cell">${money(h.hra)}</td>
        <td class="num-cell">${money(grossOf(h))}</td><td>${h.taxRegime==='old'?'Old':'New'}</td>
        <td>${new Date(h.revisedAt).toLocaleDateString('en-IN')}</td><td>${esc(h.reason||'—')}</td>
      </tr>`).join('')}
    </tbody></table>

    <div class="section-label">Compliance Records (${docs.length})</div>
    ${docs.length ? docs.map(d=>`<div class="file-chip"><span class="pill accent">${esc(d.type)}</span><span class="fname">${esc(d.period||'')} · ${money(d.amount)} · ${(d.files||[]).length} file(s)</span></div>`).join('') : '<div class="empty" style="padding:16px;">No compliance records yet.</div>'}
    <div class="section-label">Payslip History (${myPayslips.length})</div>
    ${myPayslips.length ? myPayslips.slice(0,6).map(p=>`<div class="file-chip"><span class="fname">${esc(p.period)}</span><span>${money(p.netPay)}</span></div>`).join('') : '<div class="empty" style="padding:16px;">No payslips generated yet.</div>'}

  document.getElementById('mClose').onclick = closeModal; document.getElementById('mCancel').onclick = closeModal;

function openReviseSalary(empId){
  const e = EMPLOYEES.find(x=>x.id===empId); if(!e) return;
  const s = currentSalary(e);
  const nextMonth = new Date().toISOString().slice(0,7);
  openModal(`
    <div class="modal-head"><h3>Revise Salary — ${esc(e.name)}</h3><button class="modal-close" id="mClose">✕</button></div>
    <form id="reviseForm">
      <div class="grid cols-2">
        <div class="field"><label>Effective From (month)</label><input type="month" name="effectiveFrom" value="${nextMonth}" required></div>
        <div class="field"><label>Reason for Revision</label><input type="text" name="reason" placeholder="e.g. Annual increment FY26-27"></div>
      </div>
      ${salaryFieldsHtml(s)}
      <div class="hint">This creates a new dated entry in the salary history — the previous structure is preserved for audit and for regenerating past payslips accurately.</div>
      <div class="divider"></div>
      <div class="btn-row">
        <button type="submit" class="btn">Save Revision</button>
        <button type="button" class="btn secondary" id="mCancel">Cancel</button>
      </div>
    </form>
  `, true);
  document.getElementById('mClose').onclick = closeModal; document.getElementById('mCancel').onclick = closeModal;
  wireRegimeToggle(document.getElementById('reviseForm'));
  document.getElementById('reviseForm').onsubmit = async (ev)=>{
    ev.preventDefault();
    const fd = new FormData(ev.target);
    const entry = { id: uid(), effectiveFrom: fd.get('effectiveFrom'), reason: fd.get('reason').trim(), revisedAt: new Date().toISOString(), ...readSalaryFields(fd) };
    e.salaryHistory.push(entry);
    await saveEmployees();
    closeModal(); toast('Salary revision recorded.');
    viewEmployee(empId);
  };
}

/* ============================= TAX / STATUTORY ENGINE ============================= */
function ptFor(gross){ const slab = (ORG.ptSlabs||[]).find(s => gross>=s.min && gross<=s.max); return slab ? slab.amount : 0; }

function surchargeRateNew(taxableAnnual){
  if(taxableAnnual>20000000) return 0.25;
  if(taxableAnnual>10000000) return 0.15;
  if(taxableAnnual>5000000) return 0.10;
  return 0;
}
function surchargeRateOld(taxableAnnual){
  if(taxableAnnual>50000000) return 0.37;
  if(taxableAnnual>20000000) return 0.25;
  if(taxableAnnual>10000000) return 0.15;
  if(taxableAnnual>5000000) return 0.10;
  return 0;
}
function newRegimeAnnualTax(taxableAnnual){
  if(taxableAnnual<=1200000) return {tax:0,surcharge:0,cess:0,total:0};
  const brackets=[[400000,0],[800000,.05],[1200000,.10],[1600000,.15],[2000000,.20],[2400000,.25],[Infinity,.30]];
  let tax=0, prev=0;
  for(const [cap,rate] of brackets){ if(taxableAnnual>prev){ tax += (Math.min(taxableAnnual,cap)-prev)*rate; prev=cap; } else break; }
  const surcharge = tax*surchargeRateNew(taxableAnnual);
  const cess = (tax+surcharge)*0.04;
  return {tax,surcharge,cess,total:tax+surcharge+cess};
}
function oldRegimeAnnualTax(taxableAnnual){
  if(taxableAnnual<=500000) return {tax:0,surcharge:0,cess:0,total:0};
  const brackets=[[250000,0],[500000,.05],[1000000,.20],[Infinity,.30]];
  let tax=0, prev=0;
  for(const [cap,rate] of brackets){ if(taxableAnnual>prev){ tax += (Math.min(taxableAnnual,cap)-prev)*rate; prev=cap; } else break; }
  const surcharge = tax*surchargeRateOld(taxableAnnual);
  const cess = (tax+surcharge)*0.04;
  return {tax,surcharge,cess,total:tax+surcharge+cess};
}
function hraExemptionAnnual(s){
  if(s.taxRegime!=='old') return 0;
  const hraAnnual = (s.hra||0)*12, basicAnnual=(s.basic||0)*12, rent=s.rentPaidAnnual||0;
  const byRule = Math.max(0, rent - 0.10*basicAnnual);
  const byCity = (s.metroCity?0.5:0.4)*basicAnnual;
  return Math.max(0, Math.min(hraAnnual, byRule, byCity));
}
function computePayslip(emp, period){
  const s = latestSalaryFor(emp, period);
  const gross = grossOf(s);
  const basicForPf = ORG.applyPfCeiling ? Math.min(s.basic, ORG.pfCeiling||15000) : s.basic;
  const pfEmployee = Math.round(basicForPf*0.12);
  const pfEmployer = pfEmployee; // mirrored, standard practice
  const esi = gross<=21000 ? Math.round(gross*0.0075) : 0;
  const pt = ptFor(gross);

  const grossAnnual = gross*12;
  let taxableAnnual, tdsAnnual;
  if(s.taxRegime==='old'){
    const hraEx = hraExemptionAnnual(s);
    const cap80C = Math.min(s.declared80C||0, 150000);
    taxableAnnual = Math.max(0, grossAnnual - 50000 - hraEx - cap80C - (s.declared80D||0) - (s.otherExemptions||0));
    tdsAnnual = oldRegimeAnnualTax(taxableAnnual).total;
  } else {
    taxableAnnual = Math.max(0, grossAnnual - 75000);
    tdsAnnual = newRegimeAnnualTax(taxableAnnual).total;
  }
  const tds = Math.round(tdsAnnual/12);
  const totalDeductions = pfEmployee+esi+pt+tds;
  const netPay = gross-totalDeductions;
  const ctc = gross+pfEmployer+(s.reimbursement||0);
  return {salarySnapshot:s, gross, pfEmployee, pfEmployer, esi, pt, tds, totalDeductions, netPay, reimbursement:s.reimbursement||0, ctc, taxableAnnual};
}

/* ============================= GOOGLE DRIVE SYNC ============================= */
/* Uses Google Identity Services (OAuth) + Drive API v3 + Sheets API v4 directly via fetch —
   no server needed, works fine from a static GitHub Pages site. Scope is drive.file, so the
   app can only see/edit the files and folders it creates itself, never your whole Drive. */
let gisTokenClient = null, driveAccessToken = null, driveTokenExpiry = 0;
let driveSyncTimer = null, driveBusy = false;

function driveConnected(){ return !!(driveAccessToken && Date.now() < driveTokenExpiry); }

function initGis(){
  if(gisTokenClient || !window.google || !google.accounts || !ORG.gdrive.clientId) return;
  gisTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: ORG.gdrive.clientId,
    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets',
    callback: async (resp)=>{
      if(resp.error){ toast('Google sign-in failed: '+resp.error, true); return; }
      driveAccessToken = resp.access_token;
      driveTokenExpiry = Date.now() + (Number(resp.expires_in||3500)-60)*1000;
      ORG.gdrive.connected = true; await saveOrg();
      toast('Google Drive connected.');
      try{ await driveSetup(); await driveSyncNow(); }catch(e){}
      if(activeTab==='settings') renderSettings(document.getElementById('content'), document.getElementById('tabActions'));
    }
  });
}
function connectDrive(){
  if(!ORG.gdrive.clientId){ toast('Paste your Google OAuth Client ID first.', true); return; }
  initGis();
  if(!gisTokenClient){ toast('Google sign-in is still loading — try again in a moment.', true); return; }
  gisTokenClient.requestAccessToken({ prompt: driveAccessToken ? '' : 'consent' });
}
async function disconnectDrive(){
  driveAccessToken = null; driveTokenExpiry = 0;
  ORG.gdrive.connected = false; await saveOrg();
  toast('Disconnected from Google Drive.');
  if(activeTab==='settings') renderSettings(document.getElementById('content'), document.getElementById('tabActions'));
}
async function driveFetch(url, opts){
  opts = opts || {};
  if(!driveConnected()) throw new Error('not-connected');
  opts.headers = Object.assign({}, opts.headers, { Authorization: 'Bearer '+driveAccessToken });
  const res = await fetch(url, opts);
  if(res.status===401){ driveAccessToken=null; throw new Error('token-expired'); }
  return res;
}
async function driveFindOrCreateFolder(name, parentId){
  const parentClause = parentId ? ` and '${parentId}' in parents` : " and 'root' in parents";
  const q = encodeURIComponent(`name='${name.replace(/'/g,"\\'")}' and mimeType='application/vnd.google-apps.folder' and trashed=false${parentClause}`);
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  const data = await res.json();
  if(data.files && data.files.length) return data.files[0].id;
  const body = { name, mimeType:'application/vnd.google-apps.folder' };
  body.parents = [parentId || 'root'];
  const cres = await driveFetch('https://www.googleapis.com/drive/v3/files', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const cdata = await cres.json();
  return cdata.id;
}
async function driveSetup(){
  const rootId = await driveFindOrCreateFolder('Valles EASY EMS Data', null);
  ORG.gdrive.folderId = rootId;
  ORG.gdrive.backupsFolderId = await driveFindOrCreateFolder('Backups', rootId);
  await saveOrgSilent();
}
async function saveOrgSilent(){ ensureLocal(); LOCAL.org = ORG; try{ localStorage.setItem(LS_KEY, JSON.stringify(LOCAL)); }catch(e){} }
async function driveUploadJson(name, parentId, contentObj, existingFileId){
  const metadata = { name, mimeType:'application/json' };
  if(!existingFileId && parentId) metadata.parents = [parentId];
  const boundary = 'valleseasyems_'+uid();
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(contentObj)}\r\n` +
    `--${boundary}--`;
  const url = existingFileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${existingFileId}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  const res = await driveFetch(url, { method: existingFileId?'PATCH':'POST', headers:{'Content-Type':`multipart/related; boundary=${boundary}`}, body });
  return res.json();
}
function scheduleDriveSync(){
  if(!ORG || !ORG.gdrive || !ORG.gdrive.connected || !driveConnected()) return;
  clearTimeout(driveSyncTimer);
  driveSyncTimer = setTimeout(driveSyncNow, 2500);
}
async function driveSyncNow(){
  if(!driveConnected() || driveBusy || !ORG.gdrive.connected) return;
  driveBusy = true;
  try{
    if(!ORG.gdrive.folderId) await driveSetup();
    const result = await driveUploadJson('data.json', ORG.gdrive.folderId, buildPayload(), ORG.gdrive.fileId);
    if(result && result.id){ ORG.gdrive.fileId = result.id; ORG.gdrive.lastSynced = new Date().toISOString(); await saveOrgSilent(); updateDriveStatusUI(); }
  }catch(e){ /* silent — retried on next change */ }
  driveBusy = false;
}
function updateDriveStatusUI(){
  const el = document.getElementById('driveLastSync');
  if(el) el.textContent = ORG.gdrive.lastSynced ? ('Last synced ' + new Date(ORG.gdrive.lastSynced).toLocaleString('en-IN')) : 'Not yet synced';
}
async function driveListBackups(){
  if(!driveConnected() || !ORG.gdrive.backupsFolderId) return [];
  const q = encodeURIComponent(`'${ORG.gdrive.backupsFolderId}' in parents and trashed=false`);
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,createdTime,size)&orderBy=createdTime desc&pageSize=10`);
  const data = await res.json();
  return data.files || [];
}
async function driveTrimBackups(){
  const files = await driveListBackups();
  for(const f of files.slice(5)){ try{ await driveFetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, {method:'DELETE'}); }catch(e){} }
}
async function driveBackupNow(){
  if(!driveConnected()){ toast('Connect Google Drive first.', true); return; }
  try{
    if(!ORG.gdrive.backupsFolderId) await driveSetup();
    const stamp = new Date().toISOString().replace(/[:.]/g,'-');
    await driveUploadJson(`backup-${stamp}.json`, ORG.gdrive.backupsFolderId, buildPayload(), null);
    await driveTrimBackups();
    toast('Backup saved to Google Drive (keeping latest 5).');
    if(activeTab==='settings') renderSettings(document.getElementById('content'), document.getElementById('tabActions'));
  }catch(e){ toast('Backup failed — try reconnecting Google Drive.', true); }
}
async function driveRestoreBackup(fileId, label){
  openModal(`
    <div class="modal-head"><h3>Confirm Restore</h3><button class="modal-close" id="mClose">✕</button></div>
    <p>This will replace all current data in this app with the Google Drive backup <b>${esc(label)}</b>. This cannot be undone.</p>
    <div class="btn-row"><button class="btn danger" id="confirmDriveRestore">Restore &amp; Overwrite</button><button class="btn secondary" id="mCancel">Cancel</button></div>
  `, true);
  document.getElementById('mClose').onclick = closeModal; document.getElementById('mCancel').onclick = closeModal;
  document.getElementById('confirmDriveRestore').onclick = async ()=>{
    try{
      const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
      const data = await res.json();
      if(!data.org || !data.employees){ toast('That backup file looks invalid.', true); return; }
      const gdriveKeep = ORG.gdrive;
      ORG = data.org; ORG.gdrive = gdriveKeep;
      EMPLOYEES = data.employees||[]; PAYSLIPS = data.payslips||[]; COMPLIANCE = data.compliance||{};
      await saveOrg(); await saveEmployees(); await savePayslips();
      for(const empId of Object.keys(COMPLIANCE)){ await saveCompliance(empId); }
      refreshBrand(); closeModal(); toast('Restored from Google Drive backup.'); setTab('dashboard');
    }catch(e){ toast('Restore failed.', true); }
  };
}
async function driveExportSheet(){
  if(!driveConnected()){ toast('Connect Google Drive first.', true); return; }
  try{
    if(!ORG.gdrive.folderId) await driveSetup();
    let sheetId = ORG.gdrive.sheetId;
    if(!sheetId){
      const cres = await driveFetch('https://sheets.googleapis.com/v4/spreadsheets', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ properties:{title:(ORG.companyName||'Valles EASY EMS')+' — Live Data'}, sheets:[{properties:{title:'Employees'}},{properties:{title:'Payslips'}}] }) });
      const cdata = await cres.json();
      sheetId = cdata.spreadsheetId; ORG.gdrive.sheetId = sheetId;
      await driveFetch(`https://www.googleapis.com/drive/v3/files/${sheetId}?addParents=${ORG.gdrive.folderId}&fields=id`, {method:'PATCH'});
      await saveOrgSilent();
    }
    const empRows = [['Employee ID','Name','Department','Designation','Grade','Location','Division','PAN','DOJ']]
      .concat(EMPLOYEES.map(e=>[e.empCode,e.name,e.department,e.designation,e.grade,e.location,e.division,e.pan,e.doj]));
    const slipRows = [['Employee','Employee ID','Period','Gross','Total Deductions','Net Pay','Tax Regime','Generated At']]
      .concat(PAYSLIPS.map(p=>[p.empName,p.empCode,p.period,p.gross,p.totalDeductions,p.netPay,p.taxRegime,p.generatedAt]));
    await driveFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Employees!A1:Z${empRows.length}?valueInputOption=RAW`,
      { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({values:empRows}) });
    await driveFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Payslips!A1:Z${slipRows.length}?valueInputOption=RAW`,
      { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({values:slipRows}) });
    toast('Employees & payslips exported to Google Sheet.');
    if(activeTab==='settings') renderSettings(document.getElementById('content'), document.getElementById('tabActions'));
  }catch(e){ toast('Sheet export failed.', true); }
}

/* ============================= BACKUP & RESTORE ============================= */
function renderBackup(c, actions){
  c.innerHTML = `
    <div class="card">
      <h2>Export Backup</h2>
      <p style="color:var(--muted);font-size:13px;">Downloads a single JSON file containing your company profile, employees (with full salary-revision history), payslips and all compliance records with attached documents. Store this file in your own Google Drive folder to keep an off-site copy.</p>
      <div class="btn-row"><button class="btn" id="exportBtn">⬇ Export Full Backup (.json)</button></div>
    </div>
    <div class="card">
      <h2>Restore from Backup</h2>
      <p style="color:var(--muted);font-size:13px;">Restoring will overwrite all current data in this app with the contents of the backup file. Make sure you're restoring the right file.</p>
      <div class="file-drop" id="restoreDrop">Click to choose a backup .json file</div>
      <input type="file" id="restoreInput" accept="application/json" style="display:none;">
    </div>
  `;
  document.getElementById('exportBtn').onclick = doExport;
  document.getElementById('restoreDrop').onclick = ()=> document.getElementById('restoreInput').click();
  document.getElementById('restoreInput').onchange = (e)=>{ const f = e.target.files[0]; if(f) doRestore(f); };
}
async function doExport(){
  for(const e of EMPLOYEES){ await loadCompliance(e.id); }
  const payload = { exportedAt: new Date().toISOString(), app: 'Valles EASY EMS', version: 2, org: ORG, employees: EMPLOYEES, payslips: PAYSLIPS, compliance: COMPLIANCE };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = `valles-easy-ems-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('Backup downloaded.');
}
function doRestore(file){
  const reader = new FileReader();
  reader.onload = async ()=>{
    let data; try{ data = JSON.parse(reader.result); }catch(e){ toast('Invalid backup file.', true); return; }
    if(!data.org || !data.employees){ toast('This file does not look like a valid backup.', true); return; }
    openModal(`
      <div class="modal-head"><h3>Confirm Restore</h3><button class="modal-close" id="mClose">✕</button></div>
      <p>This will replace all current data with the backup from <b>${esc(data.exportedAt||'unknown date')}</b>, containing ${data.employees.length} employee(s) and ${(data.payslips||[]).length} payslip(s). This cannot be undone.</p>
      <div class="btn-row"><button class="btn danger" id="confirmRestore">Restore &amp; Overwrite</button><button class="btn secondary" id="mCancel">Cancel</button></div>
    `);
    document.getElementById('mClose').onclick = closeModal; document.getElementById('mCancel').onclick = closeModal;
    document.getElementById('confirmRestore').onclick = async ()=>{
      ORG = data.org; EMPLOYEES = data.employees||[]; PAYSLIPS = data.payslips||[]; COMPLIANCE = data.compliance||{};
      await saveOrg(); await saveEmployees(); await savePayslips();
      for(const empId of Object.keys(COMPLIANCE)){ await saveCompliance(empId); }
      refreshBrand(); closeModal(); toast('Backup restored.'); setTab('dashboard');
    };
  };
  reader.readAsText(file);
}
