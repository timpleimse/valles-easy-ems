/* ============================= BILLS & EXPENSES ============================= */
/* Scoped to the core vendor-bill workflow — a single bill amount, GST, TDS (using the real
   Income Tax TDS section catalog below), and payment tracking. Deliberately leaves out the
   reference app's Tally ERP voucher sync, multi-currency/exchange rate handling, Reverse
   Charge Mechanism, GSTR-2B claim-month overrides, and Chart-of-Accounts ledger linkage —
   those are real, substantial systems in their own right and weren't part of what was asked
   for here. Ask if any of those are needed later. */
const TDS_SECTIONS = [
  { id:'EPF',     oldCode:'192A',    newCode:'392',          description:'EPF premature withdrawal',           defaultRate:10 },
  { id:'COM-IH',  oldCode:'194H',    newCode:'393(1) Sl 1',  description:'Commission / brokerage — Indiv/HUF',  defaultRate:5 },
  { id:'COM-OT',  oldCode:'194H',    newCode:'393(1) Sl 1',  description:'Commission / brokerage — Others',     defaultRate:5 },
  { id:'RENT-PM', oldCode:'194I(a)', newCode:'393(1) Sl 2',  description:'Rent — Plant / Machinery',            defaultRate:2 },
  { id:'RENT-LB', oldCode:'194I(b)', newCode:'393(1) Sl 2',  description:'Rent — Land / Building / Furniture',  defaultRate:10 },
  { id:'CON-IH',  oldCode:'194C',    newCode:'393(1) Sl 6',  description:'Contractor payments — Indiv/HUF',     defaultRate:1 },
  { id:'CON-OT',  oldCode:'194C',    newCode:'393(1) Sl 6',  description:'Contractor payments — Others',        defaultRate:2 },
  { id:'TECH',    oldCode:'194J(b)', newCode:'393(1) Sl 6',  description:'Technical services',                  defaultRate:2 },
  { id:'PROF',    oldCode:'194J(a)', newCode:'393(1) Sl 6',  description:'Professional fees',                   defaultRate:10 },
  { id:'PUR',     oldCode:'194Q',    newCode:'393(1) Sl 8',  description:'Purchase of goods (above 50L)',       defaultRate:0.1 },
  { id:'PERK',    oldCode:'194R',    newCode:'393(1) Sl 9',  description:'Business perquisites',                defaultRate:10 }
];
const TDS_SECTION_BY_ID = Object.fromEntries(TDS_SECTIONS.map(s=>[s.id,s]));
function tdsSectionLabel(s){ return `${s.oldCode} → ${s.newCode} · ${s.description} · ${s.defaultRate}%`; }
const EXPENSE_CATEGORIES = ['Materials','Services','Rent','Utilities','Transport','Professional Fees','Statutory','Salary','Other'];
function nextExpNo(){
  const fy = currentFYShort();
  const key = 'EXP-'+fy;
  const seq = ORG.expSeq[key]||1;
  ORG.expSeq[key] = seq+1;
  return `${ORG.expPrefix}${fy}${String(seq).padStart(3,'0')}`;
}
const CURRENCY_SYMBOLS = { INR:'₹', USD:'$', EUR:'€', GBP:'£', SGD:'S$' };
const RCM_RATES = [0,5,12,18,28];
/* Multi-currency: billAmount is in the bill's own currency; exchRate converts it to INR,
   and every downstream figure (GST, TDS, totals) is computed on that INR base — matching
   how the source app's calcExpAmounts() works.
   Reverse Charge (RCM): when applicable, the vendor is NOT collecting GST — you pay them
   only the taxable amount, and separately self-assess and pay that GST straight to the
   government (with a matching Input Tax Credit). So unlike a normal bill, the GST here is
   tracked for compliance but does NOT add to what the vendor is owed. */
function calcExpenseTotals(e){
  const billType = e.billType || 'SUPPLIER';
  function payStatusFor(netPayable, paid){
    if(paid >= netPayable - 0.5) return 'Paid';
    if(paid > 0) return 'Partial';
    return 'Pending';
  }
  if(billType==='INTERBANK'){
    // A transfer between the company's own accounts settles itself — there's nothing
    // owed to anyone afterward, so it's always fully "paid" the moment it's recorded.
    const amt = Number(e.transferAmount)||0;
    return { amt, amtINR:amt, cgst:0, sgst:0, igst:0, gstTotal:0, tdsAmount:0, deductionsTotal:0,
      grossTotal:amt, netPayable:amt, balance:0, payStatus:'Paid' };
  }
  if(billType==='STATUTORY'){
    const amt = Number(e.statutoryAmount)||0;
    const balance = Math.max(0, amt-(Number(e.paidAmount)||0));
    return { amt, amtINR:amt, cgst:0, sgst:0, igst:0, gstTotal:0, tdsAmount:0, deductionsTotal:0,
      grossTotal:amt, netPayable:amt, balance, payStatus:payStatusFor(amt, Number(e.paidAmount)||0) };
  }
  if(billType==='SALARY'){
    const amt = Number(e.statutoryAmount)||0;
    const tdsAmount = e.tdsApplicable ? amt*(Number(e.tdsRate)||0)/100 : 0;
    const deductionsTotal = e.deductionsApplicable ? (Number(e.pfAmt)||0)+(Number(e.ptAmt)||0)+(Number(e.esicAmt)||0)+(Number(e.otherDeduction)||0) : 0;
    const netPayable = amt - tdsAmount - deductionsTotal;
    const balance = Math.max(0, netPayable-(Number(e.paidAmount)||0));
    return { amt, amtINR:amt, cgst:0, sgst:0, igst:0, gstTotal:0, tdsAmount, deductionsTotal,
      grossTotal:amt, netPayable, balance, payStatus:payStatusFor(netPayable, Number(e.paidAmount)||0) };
  }
  // SUPPLIER (default/legacy records without a billType) — full GST/RCM/TDS/deductions.
  const rate = Number(e.exchRate)||1;
  const amt = Number(e.billAmount)||0;
  const amtINR = amt*rate;
  let cgst=0, sgst=0, igst=0;
  if(e.rcmApplicable){
    const r = Number(e.rcmRate)||0;
    if(e.rcmSupplyType==='inter') igst = amtINR*r/100;
    else { cgst = amtINR*r/200; sgst = amtINR*r/200; }
  } else {
    const gstAmt = amtINR * (Number(e.gstPct)||0) / 100;
    if(e.gstMode==='Inter') igst = gstAmt;
    else if(e.gstMode==='Intra'){ cgst = gstAmt/2; sgst = gstAmt/2; }
  }
  const gstTotal = cgst+sgst+igst;
  const tdsAmount = e.tdsApplicable ? amtINR * (Number(e.tdsRate)||0) / 100 : 0;
  const deductionsTotal = e.deductionsApplicable ? (Number(e.pfAmt)||0)+(Number(e.ptAmt)||0)+(Number(e.esicAmt)||0)+(Number(e.otherDeduction)||0) : 0;
  const grossTotal = e.rcmApplicable ? amtINR : (amtINR + gstTotal);
  const netPayable = grossTotal - tdsAmount - deductionsTotal;
  const balance = Math.max(0, netPayable - (Number(e.paidAmount)||0));
  return { amt, amtINR, cgst, sgst, igst, gstTotal, tdsAmount, deductionsTotal,
    grossTotal, netPayable, balance, payStatus:payStatusFor(netPayable, Number(e.paidAmount)||0) };
}
function expIsLocked(e){ return calcExpenseTotals(e).payStatus==='Paid' && !ORG.allowFinalisedExpenseEdit; }
function expStatusPill(status){
  const cls = {Pending:'bad', Partial:'warn', Paid:'good'}[status]||'neutral';
  return `<span class="pill ${cls}">${esc(status)}</span>`;
}

function renderExpenses(c, actions){
  actions.innerHTML = `<button class="btn" id="newExpBtn">+ New Bill / Expense</button>`;
  actions.querySelector('#newExpBtn').onclick = ()=> openExpenseForm();

  const withTotals = EXPENSES.map(e=>({ e, tot:calcExpenseTotals(e) }));
  const totalPayable = withTotals.reduce((s,x)=> s+x.tot.netPayable, 0);
  const totalOutstanding = withTotals.reduce((s,x)=> s+x.tot.balance, 0);
  const pendingCount = withTotals.filter(x=> x.tot.payStatus!=='Paid').length;
  const tallyPendingCount = EXPENSES.filter(e=> !e.tallyVoucherNo).length;
  const thisMonth = new Date().toISOString().slice(0,7);
  const thisMonthTotal = withTotals.filter(x=> (x.e.billDate||'').slice(0,7)===thisMonth).reduce((s,x)=> s+x.tot.netPayable, 0);

  c.innerHTML = `
    <div class="stat-row">
      <div class="stat" style="background:var(--g-blue);"><div class="n">${money(totalPayable)}</div><div class="l"><span class="ic">🧾</span>Total Billed</div></div>
      <div class="stat" style="background:var(--g-orange);"><div class="n">${money(thisMonthTotal)}</div><div class="l"><span class="ic">🗓️</span>This Month</div></div>
      <div class="stat" style="background:var(--g-red);"><div class="n">${pendingCount}</div><div class="l"><span class="ic">⏳</span>Unpaid Bills</div></div>
      <div class="stat" style="background:var(--g-green);"><div class="n">${money(totalOutstanding)}</div><div class="l"><span class="ic">💸</span>Outstanding Payable</div></div>
    </div>
    <div class="hint" style="margin:-6px 0 14px;">📋 ${tallyPendingCount} bill${tallyPendingCount===1?'':'s'} not yet posted to Tally</div>
    <div class="card">
      <h2>Bills &amp; Expenses</h2>
      <div class="grid cols-3" style="margin-top:10px;">
        <div class="field"><label>Search</label><input type="text" id="expSearch" placeholder="Voucher no., vendor, bill no., description..."></div>
        <div class="field"><label>Category</label><select id="expCatFilter"><option value="">All Categories</option>${EXPENSE_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
        <div class="field"><label>Status</label><select id="expStatusFilter"><option value="">All Statuses</option><option>Pending</option><option>Partial</option><option>Paid</option></select></div>
      </div>
      <div id="expTableWrap"></div>
    </div>
  `;
  const BILL_TYPE_LABELS = { SUPPLIER:'Supplier', STATUTORY:'Statutory', SALARY:'Salary', INTERBANK:'Inter-Bank' };
  function expPartyLabel(e){
    if(e.billType==='SALARY') return e.employeeName || '—';
    if(e.billType==='INTERBANK') return `${e.fromBankName||'?'} → ${e.toBankName||'?'}`;
    return e.vendorName || '—';
  }
  function draw(){
    const q = (document.getElementById('expSearch').value||'').toLowerCase();
    const cat = document.getElementById('expCatFilter').value;
    const st = document.getElementById('expStatusFilter').value;
    let list = EXPENSES.filter(e=>{
      const mq = !q || [e.voucherNo,e.vendorName,e.employeeName,e.billNo,e.description,e.statutoryType,e.fromBankName,e.toBankName].some(v=>(v||'').toLowerCase().includes(q));
      const mc = !cat || e.category===cat;
      const ms = !st || calcExpenseTotals(e).payStatus===st;
      return mq && mc && ms;
    });
    list = list.slice().sort((a,b)=> (b.billDate||'').localeCompare(a.billDate||''));
    const wrap = document.getElementById('expTableWrap');
    if(!list.length){ wrap.innerHTML = '<div class="empty"><div class="icon">🧾</div>No bills recorded yet.<div class="cta"><button class="btn" id="emptyNewExp">+ New Bill / Expense</button></div></div>'; document.getElementById('emptyNewExp').onclick=()=>openExpenseForm(); return; }
    wrap.innerHTML = `<table><thead><tr><th>Voucher No.</th><th>Type</th><th>Party</th><th>Date</th><th>Category</th><th class="num-cell">Net Payable</th><th class="num-cell">Balance</th><th>TDS</th><th>Docs</th><th>Tally</th><th>Status</th><th></th></tr></thead><tbody>
      ${list.map(e=>{ const tot = calcExpenseTotals(e);
        const hasBill = (e.billAttachments||e.attachments||[]).length>0;
        const hasReceipt = (e.receiptAttachments||[]).length>0;
        const needsReceipt = tot.payStatus==='Paid' || tot.payStatus==='Partial';
        return `<tr>
        <td><b>${esc(e.voucherNo)}</b>${e.billNo?`<div style="color:var(--muted);font-size:11.5px;">${esc(e.billNo)}</div>`:''}${e.currency&&e.currency!=='INR'?` <span class="pill neutral">${esc(e.currency)}</span>`:''}${e.rcmApplicable?' <span class="pill warn">RCM</span>':''}</td>
        <td><span class="pill neutral">${esc(BILL_TYPE_LABELS[e.billType]||'Supplier')}</span></td>
        <td>${esc(expPartyLabel(e))}</td><td>${esc(e.billDate||'—')}</td><td>${esc(e.category||'—')}</td>
        <td class="num-cell">${money(tot.netPayable)}</td><td class="num-cell">${money(tot.balance)}</td>
        <td>${e.tdsApplicable?`<span class="pill accent">${esc((TDS_SECTION_BY_ID[e.tdsSectionId]||{}).oldCode||'')} ${e.tdsRate}%</span>`:'—'}</td>
        <td>
          <span class="pill ${hasBill?'good':'bad'}" title="Bill copy — click to view" data-viewbill="${e.id}" style="cursor:pointer;">📄 ${hasBill?'✓':'✕'}</span>
          <span class="pill ${hasReceipt?'good':(needsReceipt?'bad':'neutral')}" title="Payment receipt — click to view" data-viewreceipt="${e.id}" style="cursor:pointer;">🧾 ${hasReceipt?'✓':'✕'}</span>
        </td>
        <td>${e.tallyVoucherNo?`<span class="pill good" title="#${esc(e.tallyVoucherNo)}">✓ Posted</span>`:'<span class="pill bad">Pending</span>'}</td>
        <td>${expStatusPill(tot.payStatus)}</td>
        <td class="no-print" style="white-space:nowrap;">
          <button class="btn secondary sm" data-edit="${e.id}">Edit</button>
          <button class="btn danger sm" data-del="${e.id}">Delete</button>
        </td></tr>`; }).join('')}
    </tbody></table>`;
    wrap.querySelectorAll('[data-viewbill]').forEach(b=> b.onclick=()=> viewAttachmentGroup(b.dataset.viewbill, 'bill'));
    wrap.querySelectorAll('[data-viewreceipt]').forEach(b=> b.onclick=()=> viewAttachmentGroup(b.dataset.viewreceipt, 'receipt'));
    wrap.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>openExpenseForm(b.dataset.edit));
    wrap.querySelectorAll('[data-del]').forEach(b=> b.onclick=()=>deleteExpense(b.dataset.del));
  }
  ['expSearch','expCatFilter','expStatusFilter'].forEach(id=> document.getElementById(id).addEventListener('input', draw));
  draw();
}

/* Renders one attachment as name+size, a View button (opens in a new tab via a blob: URL —
   see wireAttachmentButtons — so images/PDFs show inline for a quick visual check without
   hitting Chrome's block on top-frame data: URL navigation), a Download button, and — only
   when editing (rmAttr provided) — a Remove button. Shared by the edit form and the
   read-only confirm view so both always agree on what an attachment looks like. Callers
   MUST call wireAttachmentButtons() after inserting this HTML into the DOM. */
function attachmentChipHtml(f, i, rmAttr){
  const regId = registerAttachment(f);
  return `<div class="file-chip">
    <span class="fname">${esc(f.name)} (${Math.round(f.size/1024)} KB)</span>
    <button type="button" class="btn secondary sm" data-attview="${regId}">View</button>
    <button type="button" class="btn secondary sm" data-attdownload="${regId}">Download</button>
    ${rmAttr ? `<button type="button" data-${rmAttr}="${i}">✕</button>` : ''}
  </div>`;
}

          ()=> submitExpenseForm(ev, isEdit, e));

async function submitExpenseForm(ev, isEdit, e){
  const fd = new FormData(ev.target);
  const billType = fd.get('billType') || 'SUPPLIER';
  const vendor = PARTIES.find(p=>p.id===fd.get('vendorId'));
  const employee = billType==='SALARY' ? EMPLOYEES.find(x=>x.id===fd.get('employeeId')) : null;
  const rec = {
    id: e.id||uid(), billType,
    vendorId: fd.get('vendorId')||'', vendorName: vendor?vendor.partyName:'',
    employeeId: employee?employee.id:'', employeeName: employee?employee.name:'', salaryMonth: fd.get('salaryMonth')||'',
    statutoryType: fd.get('statutoryType')||'', statutoryAmount: Number(fd.get('statutoryAmount'))||0,
    fromBankName: fd.get('fromBankName')||'', toBankName: fd.get('toBankName')||'', transferAmount: Number(fd.get('transferAmount'))||0,
    billNo: fd.get('billNo').trim(), billDate: fd.get('billDate'), dueDate: fd.get('dueDate')||'',
    description: fd.get('description')?fd.get('description').trim():'', category: fd.get('category')||'',
    billAmount: Number(fd.get('billAmount'))||0, currency: fd.get('currency')||'INR', exchRate: Number(fd.get('exchRate'))||1,
    gstMode: fd.get('gstMode')||'None', gstPct: Number(fd.get('gstPct'))||0,
    rcmApplicable: fd.get('rcmApplicable')==='on', rcmRate: Number(fd.get('rcmRate'))||0, rcmSupplyType: fd.get('rcmSupplyType')||'intra',
    gstr2bClaimMonth: fd.get('gstr2bClaimMonth')||'',
    tdsApplicable: fd.get('tdsApplicable')==='on', tdsSectionId: fd.get('tdsSectionId')||'', tdsRate: Number(fd.get('tdsRate'))||0,
    deductionsApplicable: fd.get('deductionsApplicable')==='on', pfAmt: Number(fd.get('pfAmt'))||0, ptAmt: Number(fd.get('ptAmt'))||0,
    esicAmt: Number(fd.get('esicAmt'))||0, otherDeduction: Number(fd.get('otherDeduction'))||0, otherDeductionDetails: (fd.get('otherDeductionDetails')||'').trim(),
    ledgerAccountId: fd.get('ledgerAccountId')||'',
    paidAmount: billType==='INTERBANK' ? (Number(fd.get('transferAmount'))||0) : (Number(fd.get('paidAmount'))||0),
    paidFrom: e.paidFrom||'', paymentMode: fd.get('paymentMode')||'',
    paymentRef: (fd.get('paymentRef')||'').trim(), paymentDate: fd.get('paymentDate')||'', notes: fd.get('notes').trim(),
    tallyVoucherNo: fd.get('tallyVoucherNo').trim(), tallyVoucherDate: fd.get('tallyVoucherDate')||'', tallyAttachment: pendingTallyFile,
    billAttachments: pendingBillFiles, receiptAttachments: pendingReceiptFiles
  };
  if(isEdit){ rec._rev = e._rev; rec.voucherNo = e.voucherNo; }
  else { rec.voucherNo = nextExpNo(); await saveOrg(); }
  tagRecord(rec, !isEdit);
  if(isEdit){ const idx = EXPENSES.findIndex(x=>x.id===e.id); EXPENSES[idx]=rec; } else { EXPENSES.push(rec); }
  await saveExpenses();
  closeModal(); toast(isEdit?'Bill updated.':`${rec.voucherNo} recorded.`); render();
}
function deleteExpense(id){
  const e = EXPENSES.find(x=>x.id===id); if(!e) return;
  if(expIsLocked(e)){ toast('This bill is fully paid and locked. Enable editing in Settings → Bills & Expenses if this needs correcting.', true); return; }
  openModal(`
    <div class="modal-head"><h3>Delete Bill</h3><button class="modal-close" id="mClose">✕</button></div>
    <p>Delete <b>${esc(e.voucherNo)}</b> (${esc(e.vendorName)})? This cannot be undone.</p>
    <div class="btn-row"><button class="btn danger" id="confirmDelExp">Delete</button><button class="btn secondary" id="mCancel">Cancel</button></div>
  `);
  document.getElementById('mClose').onclick = closeModal; document.getElementById('mCancel').onclick = closeModal;
  document.getElementById('confirmDelExp').onclick = async ()=>{
    EXPENSES = EXPENSES.filter(x=>x.id!==id); recordTombstone('expenses', id);
    await saveExpenses(); closeModal(); toast('Bill deleted.'); render();
  };
}
/* Clicking a Docs pill in the bill list opens the attachment(s) directly — one file opens
   straight in a new tab; several files open a small chooser so it's still one click away. */
function viewAttachmentGroup(expId, group){
  const e = EXPENSES.find(x=>x.id===expId); if(!e) return;
  const files = group==='bill' ? (e.billAttachments||e.attachments||[]) : (e.receiptAttachments||[]);
  const label = group==='bill' ? 'Bill / Invoice Copy' : 'Payment Receipt';
  if(!files.length){ toast(`No ${label.toLowerCase()} attached — add one via Edit.`, true); return; }
  if(files.length===1){ openAttachmentBlob(files[0]); return; }
  openModal(`
    <div class="modal-head"><h3>${esc(label)} — ${esc(e.voucherNo)}</h3><button class="modal-close" id="mClose">✕</button></div>
    ${files.map(f=>attachmentChipHtml(f)).join('')}
    <div class="btn-row"><button class="btn secondary" id="mCancel">Close</button></div>
  `, true);
  document.getElementById('mClose').onclick = closeModal; document.getElementById('mCancel').onclick = closeModal;
  wireAttachmentButtons();
}


/* ============================= BACKUP & RESTORE ============================= */
function renderBackup(c, actions){
  c.innerHTML = `
    <div class="card">
      <h2>Export Backup</h2>
      <p style="color:var(--muted);font-size:13px;">Downloads a single JSON file containing your company profile, employees (with full salary-revision history), payslips, compliance records, parties, and company documents — all with attached files. Store this file in your own Google Drive folder to keep an off-site copy.</p>
      <div class="btn-row"><button class="btn" id="exportBtn">⬇ Export Full Backup (.json)</button></div>
    </div>
    <div class="card">
      <h2>Restore from Backup</h2>
      <p style="color:var(--muted);font-size:13px;">Restoring will overwrite all current data in this app with the contents of the backup file. Make sure you're restoring the right file.</p>
      <div class="file-drop" id="restoreDrop">Click to choose a backup .json file</div>
      <input type="file" id="restoreInput" accept="application/json" style="display:none;">
    </div>
  `;
  document.getElementById('exportBtn').onclick = doExport;
  document.getElementById('restoreDrop').onclick = ()=> document.getElementById('restoreInput').click();
  document.getElementById('restoreInput').onchange = (e)=>{ const f = e.target.files[0]; if(f) doRestore(f); };
}
async function doExport(){
  for(const e of EMPLOYEES){ await loadCompliance(e.id); }
  const payload = { exportedAt: new Date().toISOString(), app: 'Valles EASY EMS', version: 2, org: ORG, employees: EMPLOYEES, payslips: PAYSLIPS, compliance: COMPLIANCE, parties: PARTIES, documents: COMPANY_DOCS, transactions: TRANSACTIONS, expenses: EXPENSES };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = `valles-easy-ems-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('Backup downloaded.');
}
function doRestore(file){
  const reader = new FileReader();
  reader.onload = async ()=>{
    let data; try{ data = JSON.parse(reader.result); }catch(e){ toast('Invalid backup file.', true); return; }
    if(!data.org || !data.employees){ toast('This file does not look like a valid backup.', true); return; }
    openModal(`
      <div class="modal-head"><h3>Confirm Restore</h3><button class="modal-close" id="mClose">✕</button></div>
      <p>This will replace all current data with the backup from <b>${esc(data.exportedAt||'unknown date')}</b>, containing ${data.employees.length} employee(s) and ${(data.payslips||[]).length} payslip(s). This cannot be undone.</p>
      <div class="btn-row"><button class="btn danger" id="confirmRestore">Restore &amp; Overwrite</button><button class="btn secondary" id="mCancel">Cancel</button></div>
    `);
    document.getElementById('mClose').onclick = closeModal; document.getElementById('mCancel').onclick = closeModal;
    document.getElementById('confirmRestore').onclick = async ()=>{
      await applyRestoredPayload(data);
      closeModal(); toast('Backup restored.'); setTab('dashboard');
    };
  };
  reader.readAsText(file);
}

/* ============================= SETTINGS (password protected) ============================= */
function renderSettings(c, actions){
  if(!settingsUnlocked){
    const firstRun = !ORG.adminPasswordHash;
    c.innerHTML = `
      <div class="lock-screen">
        <div class="seal">🔒</div>
        <h2 style="margin:0 0 6px;">${firstRun?'Set Admin Password':'Settings are Locked'}</h2>
        <p>${firstRun?'Create a password to protect company details, logo and bank information.':'Enter the admin password to view company details, logo and bank information.'}</p>
        <div class="field" style="text-align:left;"><label>${firstRun?'New Password':'Password'}</label><input type="password" id="pwInput"></div>
        ${firstRun?`<div class="field" style="text-align:left;"><label>Confirm Password</label><input type="password" id="pwConfirm"></div>`:''}
        <button class="btn" id="pwSubmit" style="width:100%;justify-content:center;">${firstRun?'Set Password & Continue':'Unlock'}</button>
        <div id="pwError" style="color:var(--bad);font-size:12.5px;margin-top:8px;"></div>
      </div>
    `;
    document.getElementById('pwSubmit').onclick = async ()=>{
      const pw = document.getElementById('pwInput').value;
      if(!pw){ document.getElementById('pwError').textContent = 'Password cannot be empty.'; return; }
      if(firstRun){
        const confirm = document.getElementById('pwConfirm').value;
        if(pw!==confirm){ document.getElementById('pwError').textContent = 'Passwords do not match.'; return; }
        ORG.adminPasswordHash = await sha256(pw); await saveOrg();
        settingsUnlocked = true; toast('Admin password set.'); renderSettings(c, actions);
      } else {
        const hash = await sha256(pw);
        if(hash===ORG.adminPasswordHash){ settingsUnlocked = true; renderSettings(c, actions); }
        else { document.getElementById('pwError').textContent = 'Incorrect password.'; }
      }
    };

    });
  }
  ['taxNew','taxOld'].forEach(k=>{ drawTaxSlabs(k); drawSurcharge(k); });
  document.querySelectorAll('[data-addtaxslab]').forEach(b=> b.onclick = ()=>{ ORG[b.dataset.addtaxslab].slabs.push([null,0]); drawTaxSlabs(b.dataset.addtaxslab); });
  document.querySelectorAll('[data-addsurcharge]').forEach(b=> b.onclick = ()=>{ ORG[b.dataset.addsurcharge].surcharge.push([0,0]); drawSurcharge(b.dataset.addsurcharge); });
  document.getElementById('saveTaxRules').onclick = async ()=>{
    ['taxNew','taxOld'].forEach(key=>{
      const std = document.querySelector(`[data-taxfield="${key}-stdDeduction"]`);
      const reb = document.querySelector(`[data-taxfield="${key}-rebateThreshold"]`);
      const cs  = document.querySelector(`[data-taxfield="${key}-cess"]`);
      if(std) ORG[key].stdDeduction = Number(std.value)||0;
      if(reb) ORG[key].rebateThreshold = Number(reb.value)||0;
      if(cs) ORG[key].cess = (Number(cs.value)||0)/100;
      document.querySelectorAll(`[data-taxslab^="${key}-"]`).forEach(inp=>{
        const parts = inp.dataset.taxslab.split('-'); const idx = Number(parts[1]); const field = parts[2];
        const v = inp.value.trim();
        if(field==='cap') ORG[key].slabs[idx][0] = v==='' ? null : Number(v);
        else ORG[key].slabs[idx][1] = (Number(v)||0)/100;
      });
      document.querySelectorAll(`[data-surtier^="${key}-"]`).forEach(inp=>{
        const parts = inp.dataset.surtier.split('-'); const idx = Number(parts[1]); const field = parts[2];
        if(field==='threshold') ORG[key].surcharge[idx][0] = Number(inp.value)||0;
        else ORG[key].surcharge[idx][1] = (Number(inp.value)||0)/100;
      });
    });
    await saveOrg(); toast('Income tax rules saved.');
  };

  const saveCtcBtn = document.getElementById('saveCtcPolicy');
  if(saveCtcBtn) saveCtcBtn.onclick = async ()=>{
    ORG.ctcPolicy.basicPct = Math.min(0.99, Math.max(0.01, (Number(document.getElementById('basicPctField').value)||50)/100));
    ORG.ctcPolicy.childrenEducation = Number(document.getElementById('childEduField').value)||0;
    ORG.ctcPolicy.defaultReimbursement = Number(document.getElementById('defReimbField').value)||0;
    await saveOrg(); toast('CTC policy saved.');
  };
  document.getElementById('pwForm').onsubmit = async (ev)=>{
    ev.preventDefault(); const fd = new FormData(ev.target);
    const curHash = await sha256(fd.get('cur'));
    if(curHash !== ORG.adminPasswordHash){ toast('Current password is incorrect.', true); return; }
    ORG.adminPasswordHash = await sha256(fd.get('nw')); await saveOrg(); ev.target.reset(); toast('Password changed.');
  };
  c.querySelectorAll('[data-revise]').forEach(b=> b.onclick = ()=> openReviseSalary(b.dataset.revise));
  const saveNameBtn = document.getElementById('saveStaffName');
  if(saveNameBtn) saveNameBtn.onclick = ()=>{
    const v = document.getElementById('staffNameField').value.trim();
    if(!v){ toast('Please enter a name.', true); return; }
    setStaffName(v); toast('Name saved.');
  };
  document.getElementById('saveClientId').onclick = async ()=>{    ORG.gdrive.clientId = document.getElementById('gClientId').value.trim();
    gisTokenClient = null; await saveOrg(); toast('Client ID saved.');
  };
  const connectBtn = document.getElementById('connectDriveBtn');
  if(connectBtn) connectBtn.onclick = connectDrive;
  const disconnectBtn = document.getElementById('disconnectDrive');
  if(disconnectBtn) disconnectBtn.onclick = disconnectDrive;
  const backupBtn = document.getElementById('driveBackupBtn');
  if(backupBtn) backupBtn.onclick = driveBackupNow;
  const sheetBtn = document.getElementById('driveSheetBtn');
  if(sheetBtn) sheetBtn.onclick = ()=> driveExportSheet(false);
  const useCurrentBtn = document.getElementById('usePinCurrent');
  if(useCurrentBtn) useCurrentBtn.onclick = ()=>{
    document.getElementById('pinFolderId').value = ORG.gdrive.folderId||'';
    document.getElementById('pinSheetId').value = ORG.gdrive.sheetId||'';
    toast("Copied this device's current IDs into the fields below — click Save Pinned IDs, then copy them to your other devices.");
  };
  const savePinBtn = document.getElementById('savePinIds');
  if(savePinBtn) savePinBtn.onclick = async ()=>{
    ORG.gdrive.pinnedFolderId = document.getElementById('pinFolderId').value.trim();
    ORG.gdrive.pinnedSheetId = document.getElementById('pinSheetId').value.trim();
    await saveOrg(); toast('Pinned IDs saved. Next sync will use them directly.');
    driveSyncNow();
  };
  const clearPinBtn = document.getElementById('clearPinIds');
  if(clearPinBtn) clearPinBtn.onclick = async ()=>{
    ORG.gdrive.pinnedFolderId = ''; ORG.gdrive.pinnedSheetId = '';
    document.getElementById('pinFolderId').value = ''; document.getElementById('pinSheetId').value = '';
    await saveOrg(); toast('Pins cleared — back to find-or-create-by-name.');
  };
  const backupListEl = document.getElementById('driveBackupList');
  if(backupListEl){
    driveListBackups().then(files=>{
      if(!document.getElementById('driveBackupList')) return;
      if(!files.length){ backupListEl.innerHTML = '<div class="empty" style="padding:12px;">No backups yet — click "Backup Now to Drive".</div>'; return; }
      backupListEl.innerHTML = files.map(f=>`
        <div class="file-chip">
          <span class="fname">${esc(f.name)} <span style="color:var(--muted);">— ${new Date(f.createdTime).toLocaleString('en-IN')}</span></span>
          <button type="button" class="btn secondary sm" data-restore="${f.id}" data-label="${esc(f.name)}">Restore</button>
        </div>`).join('');
      backupListEl.querySelectorAll('[data-restore]').forEach(b=>{
        b.onclick = ()=> driveRestoreBackup(b.dataset.restore, b.dataset.label);
      });
    }).catch(()=>{ if(document.getElementById('driveBackupList')) backupListEl.innerHTML = '<div class="empty" style="padding:12px;">Could not load backups.</div>'; });
  }
}

/* ============================= INIT ============================= */
(async function init(){
  await loadAll();
  for(const e of EMPLOYEES){ await loadCompliance(e.id); }
  updateCompBadge();
  updateDocBadge();
  setTab('dashboard');
  if(ORG.gdrive && ORG.gdrive.connected){ attemptSilentDriveReconnect(); startAutoSyncLoop(); ensureStaffName(); }
})();
</script>
</body>
