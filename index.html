<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valles EASY EMS</title>
<style>
  :root{
    --bg:#F4F6FA;
    --card:#FFFFFF;
    --ink:#1C2430;
    --ink-soft:#4A5468;
    --muted:#8A93A6;
    --rule:#E4E8EF;
    --accent:#5B6CF9;
    --accent-soft:#EDEFFF;
    --good:#1F9D63;
    --good-soft:#E6F7EE;
    --bad:#E5483F;
    --bad-soft:#FDEBEA;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --radius: 12px;
    /* dashboard gradient palette, mirrors reference screenshot */
    --g-blue: linear-gradient(135deg,#3E7BFA,#2455D8);
    --g-orange: linear-gradient(135deg,#F79433,#E1631C);
    --g-green: linear-gradient(135deg,#33B36B,#1D8E51);
    --g-purple: linear-gradient(135deg,#9B63E8,#7635CE);
    --g-red: linear-gradient(135deg,#EB5A50,#C6352A);
    --g-amber: linear-gradient(135deg,#F5A623,#D6810C);
    --g-teal: linear-gradient(135deg,#1FB6A6,#0D8C7F);
    --g-pink: linear-gradient(135deg,#EE6FA6,#D1447F);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:14px;}
  a{color:inherit;}

  /* Top bar */
  .topnav{background:#fff;border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:20;}
  .topnav-inner{display:flex;align-items:center;gap:6px;padding:0 20px;max-width:1400px;margin:0 auto;overflow-x:auto;}
  .brand{display:flex;align-items:center;gap:9px;padding:14px 14px 14px 0;margin-right:6px;border-right:1px solid var(--rule);}
  .brand-logo{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex:0 0 32px;overflow:hidden;}
  .brand-logo img{width:100%;height:100%;object-fit:cover;}
  .brand-name{font-weight:700;font-size:13.5px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
  .brand-sub{font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:600;line-height:1.2;}

  .nav-item{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    padding:10px 14px;border-radius:10px;border:none;background:transparent;color:var(--ink-soft);
    font-size:11.5px;white-space:nowrap;position:relative;min-width:74px;
  }
  .nav-item .ic{font-size:17px;line-height:1;}
  .nav-item:hover{background:#F3F4FA;}
  .nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:700;}
  .nav-item .badge{position:absolute;top:4px;right:8px;background:var(--bad);color:#fff;font-size:9.5px;font-weight:700;border-radius:20px;padding:1px 5px;min-width:14px;text-align:center;}
  .nav-item .badge.amber{background:var(--amber,#E1961A);}

  .main-wrap{max-width:1400px;margin:0 auto;padding:22px 20px 60px;}
  .pageh{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .pageh h1{font-size:23px;margin:0;font-weight:800;letter-spacing:-.01em;}
  .pageh .sub{color:var(--muted);font-size:12.5px;margin-top:2px;}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);padding:20px;box-shadow:0 1px 2px rgba(20,30,50,.03);}
  .card + .card{margin-top:16px;}
  .card h2{font-size:15.5px;margin:0 0 14px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .card h2 .tag{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:4px;letter-spacing:.05em;}

  .grid{display:grid;gap:14px;}
  .grid.cols-2{grid-template-columns:1fr 1fr;}
  .grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
  .grid.cols-4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:900px){.grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr;}}

  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px;}
  @media(max-width:900px){.stat-row{grid-template-columns:1fr 1fr;}}
  .stat{border-radius:16px;padding:20px 20px;color:#fff;position:relative;overflow:hidden;min-height:96px;}
  .stat .n{font-size:30px;font-weight:800;position:relative;}
  .stat .l{font-size:12.5px;margin-top:5px;position:relative;opacity:.95;display:flex;align-items:center;gap:6px;}
  .stat .l .ic{font-size:14px;}

  label{display:block;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
  .field{margin-bottom:12px;}
  .hint{font-size:11px;color:var(--muted);margin-top:5px;}
  input[type=text],input[type=number],input[type=date],input[type=month],input[type=password],input[type=email],input[type=tel],select,textarea{
    width:100%;padding:9px 11px;border:1px solid var(--rule);border-radius:8px;background:#FCFDFE;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
  textarea{resize:vertical;min-height:60px;}
  .checkline{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);text-transform:none;}
  .checkline input{width:auto;}

  .btn{
    display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:9px;border:1px solid transparent;
    font-size:13.5px;font-weight:700;letter-spacing:.01em;background:var(--accent);color:#fff;
  }
  .btn:hover{background:#4658E0;}
  .btn.secondary{background:#fff;color:var(--ink);border-color:var(--rule);}
  .btn.secondary:hover{background:var(--bg);}
  .btn.danger{background:var(--bad);color:#fff;}
  .btn.danger:hover{background:#C63A31;}
  .btn.sm{padding:6px 11px;font-size:12.5px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
    padding:8px 10px;border-bottom:1px solid var(--rule);
  }
  tbody td{padding:10px 10px;border-bottom:1px solid #F0F2F6;vertical-align:middle;}
  tbody tr:hover{background:#FAFBFD;}
  .num-cell{font-family:var(--mono);text-align:right;}

  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em;}
  .pill.good{background:var(--good-soft);color:var(--good);}
  .pill.bad{background:var(--bad-soft);color:var(--bad);}
  .pill.neutral{background:var(--bg);color:var(--ink-soft);}
  .pill.accent{background:var(--accent-soft);color:var(--accent);}

  .empty{text-align:center;padding:44px 20px;color:var(--muted);}
  .empty .icon{font-size:30px;margin-bottom:8px;}
  .empty .cta{margin-top:14px;}

  .overlay{position:fixed;inset:0;background:rgba(20,30,50,.5);display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;z-index:50;}
  .overlay.show{display:flex;}
  .modal{background:var(--card);border-radius:14px;width:100%;max-width:640px;padding:24px;box-shadow:0 20px 50px rgba(20,30,50,.25);}
  .modal.wide{max-width:840px;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .modal-head h3{font-size:18px;margin:0;font-weight:800;}
  .modal-close{background:none;border:none;font-size:20px;color:var(--muted);padding:4px 8px;border-radius:6px;}
  .modal-close:hover{background:var(--bg);}

  .divider{height:1px;background:var(--rule);margin:16px 0;}
  .section-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin:18px 0 10px;font-weight:700;}
  .section-label:first-child{margin-top:0;}

  .search-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .search-bar input,.search-bar select{flex:1;min-width:150px;}

  .lock-screen{max-width:380px;margin:60px auto;text-align:center;}
  .lock-screen .seal{width:56px;height:56px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;}
  .lock-screen p{color:var(--muted);font-size:13px;}

  .file-drop{border:1.5px dashed var(--rule);border-radius:10px;padding:16px;text-align:center;background:var(--bg);cursor:pointer;}
  .file-drop:hover{border-color:var(--accent);}
  .file-chip{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--rule);border-radius:8px;padding:7px 10px;margin-top:6px;font-size:12.5px;}
  .file-chip .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .file-chip button{background:none;border:none;color:var(--bad);font-size:13px;}

  .toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:100;}
  .toast{background:var(--ink);color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;box-shadow:0 8px 20px rgba(0,0,0,.2);animation:slidein .2s ease;}
  .toast.err{background:var(--bad);}
  @keyframes slidein{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  /* Payslip — matches company salary-slip layout */
  .payslip{background:#fff;border:1.5px solid var(--ink);border-radius:4px;padding:26px;}
  .payslip-top{display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:0;}
  .payslip-top .logo{width:66px;height:66px;border-radius:50%;border:2px solid var(--ink);flex:0 0 66px;display:flex;align-items:center;justify-content:center;overflow:hidden;font-weight:800;font-size:22px;}
  .payslip-top .logo img{width:100%;height:100%;object-fit:cover;}
  .payslip-top .conameblock{text-align:center;flex:1;}
  .payslip-top .coname{font-size:19px;font-weight:800;letter-spacing:.01em;}
  .payslip-addr{text-align:center;font-size:11px;color:var(--ink-soft);padding:8px 10px;border-bottom:1px solid var(--ink);}
  .payslip-title{text-align:center;font-size:15px;font-weight:800;padding:9px 0;border-bottom:1px solid var(--ink);letter-spacing:.04em;}
  .pstable{width:100%;border-collapse:collapse;font-size:12.5px;}
  .pstable td{border:1px solid var(--ink);padding:6px 9px;}
  .pstable td.lbl{color:var(--ink-soft);width:19%;font-size:11px;}
  .pstable td.val{font-weight:700;width:31%;}
  .earnhead td{font-weight:800;font-size:13px;background:#F4F6FA;}
  .amtcell{text-align:right;font-family:var(--mono);}
  .totrow td{font-weight:800;background:#F4F6FA;}
  .netrow td{font-weight:800;background:#EAF6EF;color:var(--good);font-size:14px;}
  .payslip-foot{font-size:10.5px;color:var(--muted);padding-top:10px;display:flex;justify-content:space-between;}
  .pstable tr.wordsrow td{font-size:11px;padding:8px 9px;font-style:italic;color:var(--ink-soft);background:#FAFBFD;}
  .pstable tr.wordsrow .wlabel{font-weight:800;font-style:normal;text-transform:uppercase;letter-spacing:.05em;font-size:10px;color:var(--ink);}
  .regime-note{font-size:10px;color:var(--muted);margin-top:10px;line-height:1.6;border-top:1px dashed var(--rule);padding-top:8px;}

  .app-footer{margin:34px 0 8px;padding-top:16px;border-top:1px solid var(--rule);text-align:center;font-size:11.5px;color:var(--muted);line-height:1.9;}
  .app-footer div:first-child{font-weight:600;color:var(--ink-soft);}

  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{position:absolute;left:0;top:0;width:100%;padding:0;margin:0;}
    #printArea img{display:block !important;}
    .payslip, .payslip *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
    .no-print{display:none !important;}
  }
</style>
</head>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
/* ============================= LOCAL STORAGE (fast local cache) ============================= */
/* This app is designed to be deployed as a static site (e.g. GitHub Pages), so it has no
   server of its own. All data lives in the browser via localStorage as a working cache,
   and — once you connect Google Drive in Settings — is synced to a JSON file in your own
   Drive account (the durable, off-device copy), plus rotating 5-file backups. See README.md
   for deployment + Drive setup. */
const LS_KEY = 'vallesEasyEmsData_v1';
let LOCAL = null;
function ensureLocal(){
  if(LOCAL) return LOCAL;
  try{ const raw = localStorage.getItem(LS_KEY); LOCAL = raw ? JSON.parse(raw) : {}; }
  catch(e){ LOCAL = {}; }
  if(!LOCAL.compliance) LOCAL.compliance = {};
  if(!LOCAL.tombstones) LOCAL.tombstones = {};
  return LOCAL;
}
function recordTombstone(kind, id){
  ensureLocal();
  if(!LOCAL.tombstones[kind]) LOCAL.tombstones[kind] = {};
  LOCAL.tombstones[kind][id] = new Date().toISOString();
  try{ localStorage.setItem(LS_KEY, JSON.stringify(LOCAL)); }catch(e){}
}
async function getJSON(key, def){
  ensureLocal();
  if(key==='org-profile') return LOCAL.org!=null ? LOCAL.org : def;
  if(key==='employees') return LOCAL.employees!=null ? LOCAL.employees : def;
  if(key==='payslips') return LOCAL.payslips!=null ? LOCAL.payslips : def;
  if(key.indexOf('compliance:')===0){ const v = LOCAL.compliance[key.slice(11)]; return v!=null ? v : def; }
  return def;
}
async function setJSON(key, value){
  ensureLocal();
  if(key==='org-profile') LOCAL.org = value;
  else if(key==='employees') LOCAL.employees = value;
  else if(key==='payslips') LOCAL.payslips = value;
  else if(key.indexOf('compliance:')===0){ LOCAL.compliance[key.slice(11)] = value; }
  try{ localStorage.setItem(LS_KEY, JSON.stringify(LOCAL)); }
  catch(e){ toast('Local save failed — browser storage may be full. Try removing large documents.', true); return false; }
  scheduleDriveSync();
  return true;
}
function buildPayload(){
  ensureLocal();
  return { app:'Valles EASY EMS', version:2, savedAt:new Date().toISOString(),
    org:ORG, employees:EMPLOYEES, payslips:PAYSLIPS, compliance:COMPLIANCE, tombstones:LOCAL.tombstones };
}

/* ============================= STATE ============================= */
let ORG = null, EMPLOYEES = [], PAYSLIPS = [], COMPLIANCE = {};
let settingsUnlocked = false;
let activeTab = 'dashboard';

const DEFAULT_ORG = {
  companyName: "Your Company Pvt. Ltd.",
  address: "", tel:"", email:"",
  cin: "", pan: "", tan: "", logo: "",
  bankName: "", bankAccNo: "", bankIFSC: "", bankBranch: "",
  ptSlabs: [ {min:0, max:15000, amount:0}, {min:15001, max:20000, amount:150}, {min:20001, max:1000000000, amount:200} ],
  applyPfCeiling: false, pfCeiling: 15000,
  /* CTC structuring policy: given ONE CTC number, this is how the full monthly breakdown
     is derived. See "Revise by CTC" in Salary Revision. Editable in Settings. */
  ctcPolicy: { basicPct: 0.50, childrenEducation: 200, defaultReimbursement: 40000 },
  /* Income-tax rules for both regimes — editable in Settings so HR can update them when the
     government revises slabs/rates in a future Budget, without needing the app rebuilt.
     Defaults below are the FY2025-26 rules this app shipped with. slabs: [cap, rate] pairs,
     cap:null means "and above". surcharge: [incomeAbove, rate] tiers. */
  taxNew: {
    stdDeduction: 75000, rebateThreshold: 1200000, cess: 0.04,
    slabs: [[400000,0],[800000,0.05],[1200000,0.10],[1600000,0.15],[2000000,0.20],[2400000,0.25],[null,0.30]],
    surcharge: [[5000000,0.10],[10000000,0.15],[20000000,0.25]]
  },
  taxOld: {
    stdDeduction: 50000, rebateThreshold: 500000, cess: 0.04,
    slabs: [[250000,0],[500000,0.05],[1000000,0.20],[null,0.30]],
    surcharge: [[5000000,0.10],[10000000,0.15],[20000000,0.25],[50000000,0.37]]
  },
  adminPasswordHash: "", employeeSeq: 1,
  gdrive: { clientId:'870827159813-4g2i299mv9qduqpmju40mpr5f63uvgns.apps.googleusercontent.com', connected:false, folderId:null, fileId:null, backupsFolderId:null, sheetId:null, lastSynced:null, email:'' }
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function money(n){ n = Number(n)||0; return "₹" + n.toLocaleString('en-IN', {maximumFractionDigits:0}); }
function money2(n){ n = Number(n)||0; return "₹" + n.toLocaleString('en-IN', {maximumFractionDigits:2}); }
function timeAgo(iso){
  const s = Math.max(0, Math.round((Date.now() - new Date(iso).getTime())/1000));
  if(s < 60) return 'just now';
  if(s < 3600) return Math.round(s/60)+'m ago';
  if(s < 86400) return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago';
}
function lastActivity(){
  let best = null;
  EMPLOYEES.forEach(e=>{ if(e._updatedAt && (!best || e._updatedAt > best.at)) best = { at:e._updatedAt, by:e._updatedBy||'Unknown' }; });
  PAYSLIPS.forEach(p=>{ if(p._updatedAt && (!best || p._updatedAt > best.at)) best = { at:p._updatedAt, by:p._updatedBy||'Unknown' }; });
  return best;
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* Indian numbering system — rupees in words (lakh/crore), used on the payslip */
const W_ONES = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve',
  'Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
const W_TENS = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
function twoDigitWords(n){
  if(n < 20) return W_ONES[n];
  return W_TENS[Math.floor(n/10)] + (n%10 ? ' ' + W_ONES[n%10] : '');
}
function threeDigitWords(n){
  let out = '';
  if(n > 99){ out += W_ONES[Math.floor(n/100)] + ' Hundred'; if(n%100) out += ' '; }
  if(n%100) out += twoDigitWords(n%100);
  return out;
}
function integerToIndianWords(n){
  n = Math.floor(Math.abs(Number(n)||0));
  if(n === 0) return 'Zero';
  const parts = [];
  const crore = Math.floor(n / 10000000); n %= 10000000;
  const lakh  = Math.floor(n / 100000);   n %= 100000;
  const thou  = Math.floor(n / 1000);     n %= 1000;
  const rest  = n;
  if(crore) parts.push(integerToIndianWords(crore) + ' Crore');
  if(lakh)  parts.push(twoDigitWords(lakh) + ' Lakh');
  if(thou)  parts.push(twoDigitWords(thou) + ' Thousand');
  if(rest)  parts.push(threeDigitWords(rest));
  return parts.join(' ');
}
function rupeesInWords(amount){
  const n = Math.abs(Number(amount)||0);
  const rupees = Math.floor(n);
  const paise = Math.round((n - rupees) * 100);
  let out = 'Rupees ' + integerToIndianWords(rupees);
  if(paise > 0) out += ' and ' + twoDigitWords(paise) + ' Paise';
  return out + ' Only';
}
function toast(msg, isErr){
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div'); t.className = 'toast'+(isErr?' err':''); t.textContent = msg;
  wrap.appendChild(t); setTimeout(()=>t.remove(), 3200);
}
async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ============================= SALARY HISTORY HELPERS ============================= */
function currentSalary(emp){ return latestSalaryFor(emp, '9999-12'); }
function latestSalaryFor(emp, period){
  const hist = (emp.salaryHistory||[]).slice().sort((a,b)=> a.effectiveFrom.localeCompare(b.effectiveFrom));
  let chosen = hist[0];
  for(const h of hist){ if(h.effectiveFrom<=period) chosen=h; else break; }
  return chosen;
}
function grossOf(s){ return (s.basic||0)+(s.hra||0)+(s.childrenEducation||0)+(s.otherAllowance||0)+(s.lta||0); }

      bankName: fd.get('bankName').trim(), bankAccNo: fd.get('bankAccNo').trim(), ifsc: fd.get('ifsc').trim().toUpperCase(),
      salaryHistory: e.salaryHistory
    };
    if(isEdit) updated._rev = e._rev;

/* ============================= CTC-DRIVEN SALARY STRUCTURING ============================= */
/* Given a single CTC figure, derives the full monthly breakdown per Settings → CTC Structuring
   Policy: Basic = basicPct × CTC; HRA = 50% of Basic; Children Education is a fixed monthly
   amount; LTA = Basic ÷ 12; PF Employee & PF Employer are each 12% of Basic (respecting the
   EPF wage ceiling if enabled); Professional Tax follows the configured slabs; Other Allowance
   is the balancing figure so everything reconciles exactly back to the CTC entered. PT depends
   on gross and gross depends on PT, so this iterates a couple of times to converge (it always
   does — PT only takes a handful of discrete values). */
function deriveFromCTC(ctc, reimbursement){
  const pol = ORG.ctcPolicy;
  const basic = ctc * pol.basicPct;
  const hra = basic * 0.5;
  const childrenEducation = pol.childrenEducation;
  const lta = basic / 12;
  const basicForPf = ORG.applyPfCeiling ? Math.min(basic, ORG.pfCeiling||15000) : basic;
  const pfEmployee = Math.round(basicForPf*0.12);
  const pfEmployer = pfEmployee;
  let pt = ptFor(ctc); // seed with a reasonable guess
  let gross=0, otherAllowance=0;
  for(let i=0;i<4;i++){
    gross = ctc - pfEmployee - pfEmployer - pt - reimbursement;
    otherAllowance = gross - basic - hra - childrenEducation - lta;
    const nextPt = ptFor(gross);
    if(nextPt===pt) break;
    pt = nextPt;
  }
  return { basic, hra, childrenEducation, lta, otherAllowance, pfEmployee, pfEmployer, pt, reimbursement, gross,
    ctcCheck: gross+pfEmployee+pfEmployer+pt+reimbursement };
}

/* ============================= TAX / STATUTORY ENGINE ============================= */
function ptFor(gross){ const slab = (ORG.ptSlabs||[]).find(s => gross>=s.min && gross<=s.max); return slab ? slab.amount : 0; }

function surchargeRateFor(taxableAnnual, tiers){
  let rate = 0;
  (tiers||[]).slice().sort((a,b)=>a[0]-b[0]).forEach(([threshold,r])=>{ if(taxableAnnual>threshold) rate = r; });
  return rate;
}
/* Generic slab-tax computer, driven entirely by ORG.taxNew / ORG.taxOld — see Settings →
   Income Tax Rules. Editing those there re-shapes this calculation with no code change,
   for when a future Budget revises slabs, rebate thresholds, cess, or surcharge tiers. */
function regimeAnnualTax(taxableAnnual, rules){
  if(taxableAnnual<=(rules.rebateThreshold||0)) return {tax:0,surcharge:0,cess:0,total:0};
  let tax=0, prev=0;
  (rules.slabs||[]).forEach(([cap,rate])=>{
    const capVal = (cap===null||cap===undefined) ? Infinity : Number(cap);
    if(taxableAnnual>prev){ tax += (Math.min(taxableAnnual,capVal)-prev)*rate; prev=capVal; }
  });
  const surcharge = tax*surchargeRateFor(taxableAnnual, rules.surcharge);
  const cess = (tax+surcharge)*(rules.cess!=null?rules.cess:0.04);
  return {tax,surcharge,cess,total:tax+surcharge+cess};
}
function newRegimeAnnualTax(taxableAnnual){ return regimeAnnualTax(taxableAnnual, ORG.taxNew); }
function oldRegimeAnnualTax(taxableAnnual){ return regimeAnnualTax(taxableAnnual, ORG.taxOld); }
function hraExemptionAnnual(s){
  if(s.taxRegime!=='old') return 0;
  const hraAnnual = (s.hra||0)*12, basicAnnual=(s.basic||0)*12, rent=s.rentPaidAnnual||0;
  const byRule = Math.max(0, rent - 0.10*basicAnnual);
  const byCity = (s.metroCity?0.5:0.4)*basicAnnual;
  return Math.max(0, Math.min(hraAnnual, byRule, byCity));
}
/* Computes tax on an annual taxable-income figure for a salary structure's chosen regime,
   applying the same deductions/exemptions computePayslip uses. Shared by the regular and
   bonus-inclusive calculations below so both go through identical logic. */
function annualTaxFor(s, grossAnnual){
  let taxableAnnual, total;
  if(s.taxRegime==='old'){
    const hraEx = hraExemptionAnnual(s);
    const cap80C = Math.min(s.declared80C||0, 150000);
    taxableAnnual = Math.max(0, grossAnnual - (ORG.taxOld.stdDeduction||50000) - hraEx - cap80C - (s.declared80D||0) - (s.otherExemptions||0));
    total = oldRegimeAnnualTax(taxableAnnual).total;
  } else {
    taxableAnnual = Math.max(0, grossAnnual - (ORG.taxNew.stdDeduction||75000));
    total = newRegimeAnnualTax(taxableAnnual).total;
  }
  return { taxableAnnual, total };
}
/* Ex-gratia / one-time bonus TDS: per Section 192's average-rate method, the bonus is NOT
   annualised (×12) like regular salary — that would wildly overstate annual income. Instead:
   compare "annual tax without the bonus" vs "annual tax with the bonus added once", and the
   difference is the incremental tax the bonus itself causes. That full amount is deducted in
   the bonus month; regular monthly TDS in every other month is unaffected. This matches how
   most Indian payroll systems handle bonus TDS. Bonus is treated as fully taxable, and — per
   common practice — excluded from PF/ESI wages (it isn't "basic wages") but included in the
   month's gross for Professional Tax slab lookup, since PT is normally assessed on the
   month's total salary paid. Review this treatment against your state's PT rules and your
   company's bonus policy; it's a reasonable default, not a statutory guarantee. */
function computePayslip(emp, period, bonus){
  bonus = Number(bonus)||0;
  const s = latestSalaryFor(emp, period);
  const gross = grossOf(s);
  const basicForPf = ORG.applyPfCeiling ? Math.min(s.basic, ORG.pfCeiling||15000) : s.basic;
  const pfEmployee = Math.round(basicForPf*0.12);
  const pfEmployer = pfEmployee; // mirrored, standard practice; bonus excluded from PF wages
  const esi = gross<=21000 ? Math.round(gross*0.0075) : 0; // bonus excluded from ESI wages
  const grossWithBonus = gross + bonus;
  const pt = ptFor(grossWithBonus);

  const grossAnnual = gross*12;
  const regularCalc = annualTaxFor(s, grossAnnual);
  const regularTds = Math.round(regularCalc.total/12);
  let tds = regularTds, bonusTaxImpact = 0, taxableAnnual = regularCalc.taxableAnnual;
  if(bonus > 0){
    const withBonusCalc = annualTaxFor(s, grossAnnual + bonus);
    bonusTaxImpact = Math.max(0, withBonusCalc.total - regularCalc.total);
    tds = regularTds + Math.round(bonusTaxImpact);
    taxableAnnual = withBonusCalc.taxableAnnual;
  }

  const totalDeductions = pfEmployee+esi+pt+tds;
  const netPay = gross+bonus-totalDeductions;
  const ctc = gross+pfEmployer+(s.reimbursement||0);
  return {salarySnapshot:s, gross, bonus, pfEmployee, pfEmployer, esi, pt, tds, regularTds, bonusTaxImpact,
    totalDeductions, netPay, reimbursement:s.reimbursement||0, ctc, taxableAnnual};
}

function openEditPayslip(payslipId){
  const p = PAYSLIPS.find(x=>x.id===payslipId); if(!p) return;
  const baseRev = Number(p._rev)||0;
  const f = (label, key, val)=>`<div class="field"><label>${label}</label><input type="number" step="0.01" min="0" data-pf="${key}" value="${Number(val)||0}"></div>`;
  openModal(`
    <div class="modal-head"><h3>Edit Payslip — ${esc(p.empName)} (${esc(p.period)})</h3><button class="modal-close" id="mClose">✕</button></div>
    <p class="hint">Adjust the figures on this payslip for corrections. Gross, total deductions and net salary recalculate automatically. This edits <b>only this payslip</b> — it does not change the employee's salary structure.</p>
    <div class="section-label">Earnings</div>
    <div class="grid cols-3">
      ${f('Basic','basic',p.basic)}${f('HRA','hra',p.hra)}${f('Children Education','childrenEducation',p.childrenEducation)}
      ${f('Other Allowance','otherAllowance',p.otherAllowance)}${f('LTA','lta',p.lta)}${f('Ex-Gratia Bonus','bonus',p.bonus)}
    </div>
    <div class="section-label">Deductions</div>
    <div class="grid cols-3">
      ${f('Provident Fund','pfEmployee',p.pfEmployee)}${f('ESI','esi',p.esi)}${f('Professional Tax','pt',p.pt)}
      ${f('Regular TDS','regularTds',p.regularTds!=null?p.regularTds:p.tds)}${f('Extra TDS on Bonus','bonusTaxImpact',p.bonusTaxImpact)}
    </div>
    <div class="divider"></div>
    <div id="editSlipTotals" class="grid cols-3"></div>
    <div class="btn-row"><button class="btn" id="saveSlipEdit">Save Changes</button><button class="btn secondary" id="mCancel">Cancel</button></div>
  `, true);
  document.getElementById('mClose').onclick = closeModal; document.getElementById('mCancel').onclick = closeModal;
  const inputs = ()=> Array.from(document.querySelectorAll('[data-pf]'));
  function vals(){ const o={}; inputs().forEach(i=> o[i.dataset.pf] = Number(i.value)||0); return o; }
  function recalc(){
    const v = vals();
    const gross = v.basic + v.hra + v.childrenEducation + v.otherAllowance + v.lta;
    const tds = v.regularTds + v.bonusTaxImpact;
    const ded = v.pfEmployee + v.esi + v.pt + tds;
    document.getElementById('editSlipTotals').innerHTML =
      `<div><label>Gross Earning (incl. bonus)</label><div><b>${money2(gross+v.bonus)}</b></div></div>
       <div><label>Total Deduction (TDS: ${money2(tds)})</label><div><b>${money2(ded)}</b></div></div>
       <div><label>Net Salary</label><div><b>${money2(gross+v.bonus-ded)}</b></div></div>
       <div style="grid-column:1/-1;font-size:11px;color:var(--muted);font-style:italic;">${esc(rupeesInWords(gross+v.bonus-ded))}</div>`;
  }
  inputs().forEach(i=> i.addEventListener('input', recalc));
  recalc();
  document.getElementById('saveSlipEdit').onclick = async ()=>{
    const conflict = await checkRecordConflict('payslips', payslipId, baseRev);
    if(conflict){
      conflictWarning(conflict._updatedBy, conflict._updatedAt,
        ()=>{ const idx = PAYSLIPS.findIndex(x=>x.id===payslipId); if(idx>-1) PAYSLIPS[idx]=conflict; openEditPayslip(payslipId); },
        ()=> submitPayslipEdit(payslipId, vals()));
      return;
    }
    await submitPayslipEdit(payslipId, vals());
  };
}
async function submitPayslipEdit(payslipId, v){
    const p = PAYSLIPS.find(x=>x.id===payslipId); if(!p) return;
    Object.assign(p, v);
    p.tds = v.regularTds + v.bonusTaxImpact;
    p.gross = v.basic + v.hra + v.childrenEducation + v.otherAllowance + v.lta;
    p.totalDeductions = v.pfEmployee + v.esi + v.pt + p.tds;
    p.netPay = p.gross + v.bonus - p.totalDeductions;
    tagRecord(p, false);
    await savePayslips(); closeModal(); toast('Payslip updated.'); render();
}

const COMPLIANCE_TYPES = ['TDS','EPFO','ESIC','PT'];

function renderCompliance(c, actions){
  actions.innerHTML = `<button class="btn" id="addCompBtn">+ Add Compliance Record</button>`;
  actions.querySelector('#addCompBtn').onclick = openComplianceForm;
  c.innerHTML = `
    <div class="card">
      <div class="search-bar">
        <select id="filterType"><option value="">All Types</option>${COMPLIANCE_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
        <select id="filterEmp"><option value="">All Employees</option>${EMPLOYEES.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join('')}</select>
      </div>
      <div id="compTableWrap"></div>
    </div>
  `;
  loadAllCompliance().then(draw);
  document.getElementById('filterType').addEventListener('change', draw);
  document.getElementById('filterEmp').addEventListener('change', draw);
  async function loadAllCompliance(){ for(const e of EMPLOYEES){ await loadCompliance(e.id); } updateCompBadge(); }
  function draw(){
    const typeF = document.getElementById('filterType').value, empF = document.getElementById('filterEmp').value;
    let rows = [];
    Object.keys(COMPLIANCE).forEach(empId=>{
      const emp = EMPLOYEES.find(x=>x.id===empId); if(!emp) return;
      (COMPLIANCE[empId]||[]).forEach(rec=>{
        if(typeF && rec.type!==typeF) return; if(empF && empId!==empF) return;
        rows.push({...rec, empId, empName: emp.name, empCode: emp.empCode});
      });
    });
    rows.sort((a,b)=> (b.date||'').localeCompare(a.date||''));
    const wrap = document.getElementById('compTableWrap');
    if(!rows.length){ wrap.innerHTML = '<div class="empty"><div class="icon">📋</div>No compliance records found.</div>'; return; }
    wrap.innerHTML = `<table><thead><tr><th>Type</th><th>Employee</th><th>Period</th><th>Ref./Challan No.</th><th class="num-cell">Amount</th><th>Docs</th><th></th></tr></thead><tbody>
      ${rows.map(r=>`<tr>
        <td><span class="pill accent">${esc(r.type)}</span></td><td>${esc(r.empName)}</td><td>${esc(r.period||'—')}</td>
        <td>${esc(r.refNo||'—')}</td><td class="num-cell">${money(r.amount)}</td>
        <td>${(r.files||[]).length ? `<span class="pill good">${r.files.length} file(s)</span>` : `<span class="pill neutral">None</span>`}</td>
        <td><div class="btn-row"><button class="btn secondary sm" data-view-comp="${r.empId}|${r.id}">View</button><button class="btn danger sm" data-del-comp="${r.empId}|${r.id}">Delete</button></div></td>
      </tr>`).join('')}
    </tbody></table>`;
    wrap.querySelectorAll('[data-view-comp]').forEach(b=>b.onclick=()=>{ const [empId,recId]=b.dataset.viewComp.split('|'); viewComplianceRecord(empId, recId); });
    wrap.querySelectorAll('[data-del-comp]').forEach(b=>b.onclick=async ()=>{
      const [empId,recId]=b.dataset.delComp.split('|');
      COMPLIANCE[empId] = (COMPLIANCE[empId]||[]).filter(x=>x.id!==recId);
      await saveCompliance(empId); toast('Record deleted.'); draw(); updateCompBadge();
    });
  }
}
function updateCompBadge(){
  let missing = 0;
  Object.values(COMPLIANCE).forEach(arr=> arr.forEach(r=>{ if(!(r.files||[]).length) missing++; }));
  const badge = document.getElementById('compBadge');
  if(missing>0){ badge.style.display='inline-block'; badge.textContent = missing; } else { badge.style.display='none'; }
}

/* ============================= GOOGLE DRIVE SYNC ============================= */
/* Uses Google Identity Services (OAuth) + Drive API v3 + Sheets API v4 directly via fetch —
   no server needed, works fine from a static GitHub Pages site. Scope is drive.file, so the
   app can only see/edit the files and folders it creates itself, never your whole Drive. */
let gisTokenClient = null, driveAccessToken = null, driveTokenExpiry = 0, driveLastError = null;
let driveSyncTimer = null, driveAutoInterval = null, driveBusy = false, driveReconnecting = false;

function driveConnected(){ return !!(driveAccessToken && Date.now() < driveTokenExpiry); }

function initGis(){
  if(gisTokenClient || !window.google || !google.accounts || !ORG.gdrive.clientId) return;
  gisTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: ORG.gdrive.clientId,
    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets',
    callback: async (resp)=>{
      driveReconnecting = false;
      if(resp.error){
        if(resp.error!=='immediate_failed' && resp.error!=='popup_closed' && resp.error!=='popup_failed_to_open') toast('Google sign-in failed: '+resp.error, true);
        updateDriveStatusUI(); return;
      }
      driveAccessToken = resp.access_token;
      driveTokenExpiry = Date.now() + (Number(resp.expires_in||3500)-60)*1000;
      ORG.gdrive.connected = true; await saveOrg();
      toast('Google Drive connected.');
      ensureStaffName();
      try{ await driveSetup(); await driveSyncNow(); }catch(e){}

/* Called once on app load in every window/tab: if this browser previously connected Drive
   here, try to re-establish the session quietly (no popup) so sync "just works" without the
   person re-clicking Connect in each new window. If Google can't do it silently (no active
   Google session in this browser, or the browser blocks the silent attempt), it fails quietly
   and the Settings tab shows a Connect button as normal. */
function attemptSilentDriveReconnect(){
  if(!ORG.gdrive || !ORG.gdrive.connected || !ORG.gdrive.clientId) return;
  driveReconnecting = true;
  let tries = 0;
  const iv = setInterval(()=>{
    tries++;
    if(window.google && google.accounts && google.accounts.oauth2){
      clearInterval(iv);
      initGis();
      if(gisTokenClient) gisTokenClient.requestAccessToken({ prompt:'' });
      else driveReconnecting = false;
    } else if(tries > 24){ clearInterval(iv); driveReconnecting = false; }
  }, 250);
}
async function driveFetch(url, opts){
  opts = opts || {};
  if(!driveConnected()) throw new Error('Not connected to Google Drive');
  opts.headers = Object.assign({}, opts.headers, { Authorization: 'Bearer '+driveAccessToken });
  const res = await fetch(url, opts);
  if(res.status===401){ driveAccessToken=null; throw new Error('Google Drive session expired — reconnect in Settings'); }
  if(!res.ok){
    let detail = '';
    try{ const body = await res.clone().json(); detail = (body && body.error && body.error.message) || ''; }catch(e){}
    driveLastError = `${res.status}${detail?': '+detail:''}`;
    throw new Error(`Drive/Sheets request failed (${res.status})${detail?': '+detail:''}`);
  }
  return res;
}
async function driveFindOrCreateFolder(name, parentId){
  const parentClause = parentId ? ` and '${parentId}' in parents` : " and 'root' in parents";
  const q = encodeURIComponent(`name='${name.replace(/'/g,"\\'")}' and mimeType='application/vnd.google-apps.folder' and trashed=false${parentClause}`);
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  const data = await res.json();
  if(data.files && data.files.length) return data.files[0].id;
  const body = { name, mimeType:'application/vnd.google-apps.folder' };
  body.parents = [parentId || 'root'];
  const cres = await driveFetch('https://www.googleapis.com/drive/v3/files', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const cdata = await cres.json();
  return cdata.id;
}

async function driveUploadJson(name, parentId, contentObj, existingFileId){
  const metadata = { name, mimeType:'application/json' };
  if(!existingFileId && parentId) metadata.parents = [parentId];
  const boundary = 'valleseasyems_'+uid();
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(contentObj)}\r\n` +
    `--${boundary}--`;
  const url = existingFileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${existingFileId}?uploadType=multipart`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  const res = await driveFetch(url, { method: existingFileId?'PATCH':'POST', headers:{'Content-Type':`multipart/related; boundary=${boundary}`}, body });
  return res.json();
}
/* Change-triggered sync: fires a few seconds after the person edits something, so a save

   so other open windows/tabs and any missed edits still land within 20s. */

/* ============================= MULTI-STAFF SYNC SAFETY ============================= */
/* Since several people can have this app open at once on different machines, saves don't
   just overwrite Drive — they PULL the latest remote data first, MERGE it record-by-record
   with what's on this device (so a colleague's unrelated edits are never clobbered), and only
   then push. Records carry _rev/_updatedBy/_updatedAt so we can tell whose edit is newer. */
function currentStaffName(){ return (localStorage.getItem('vallesEasyEmsStaffName')||'').trim(); }
function setStaffName(n){ try{ localStorage.setItem('vallesEasyEmsStaffName', (n||'').trim()); }catch(e){} }
function ensureStaffName(){
  if(currentStaffName()) return;
  openModal(`
    <div class="modal-head"><h3>Who's using this device?</h3></div>
    <p class="hint">Since a few of you may be working on this at the same time, your name gets tagged on the changes you make — that's how the app knows whose edit is newest if two people touch the same record.</p>
    <div class="field"><label>Your Name</label><input type="text" id="staffNameInput" placeholder="e.g. Priya"></div>
    <div class="btn-row"><button class="btn" id="staffNameSave">Continue</button></div>
  `);
  document.getElementById('staffNameSave').onclick = ()=>{
    const v = document.getElementById('staffNameInput').value.trim();
    if(!v){ toast('Please enter a name.', true); return; }
    setStaffName(v); closeModal();
  };
}
function tagRecord(rec, isNew){
  rec._rev = isNew ? 1 : (Number(rec._rev)||0) + 1;
  rec._updatedBy = currentStaffName() || 'Unknown';
  rec._updatedAt = new Date().toISOString();
  return rec;
}
async function pullRemotePayload(){
  if(!driveConnected() || !ORG.gdrive.fileId) return null;
  try{
    const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${ORG.gdrive.fileId}?alt=media`);
    if(!res.ok) return null;
    return await res.json();
  }catch(e){ return null; }
}
/* Merges a remote collection into the local one by id, and honours deletions: any id
   tombstoned on EITHER this device or the remote payload is dropped from the result, no
   matter which side still has a live copy of it — deletion always wins, matching the "this
   cannot be undone" the delete confirmation already promises. A colleague's newer edit
   (_rev) or brand-new record is otherwise adopted; anything the same or older stays as our
   in-memory copy (which may include the change we're about to save). */
function mergeCollection(tombKind, localArr, remoteArr, remoteTomb){
  ensureLocal();
  remoteArr = remoteArr || [];
  remoteTomb = remoteTomb || {};
  if(!LOCAL.tombstones[tombKind]) LOCAL.tombstones[tombKind] = {};
  const mergedTomb = Object.assign({}, remoteTomb, LOCAL.tombstones[tombKind]);
  LOCAL.tombstones[tombKind] = mergedTomb;
  let result = localArr.slice();
  remoteArr.forEach(r=>{
    if(mergedTomb[r.id]) return;
    const idx = result.findIndex(x=>x.id===r.id);
    if(idx===-1){ result.push(r); return; }
    const localRev = Number(result[idx]._rev)||0, remoteRev = Number(r._rev)||0;
    if(remoteRev > localRev) result[idx] = r;
  });
  result = result.filter(x=> !mergedTomb[x.id]);
  try{ localStorage.setItem(LS_KEY, JSON.stringify(LOCAL)); }catch(e){}
  return result;
}
/* Checks whether a specific record changed on Drive after `snapshotRev` (i.e. someone else
   saved a newer edit while this device had the record open in a form). Returns the newer
   remote record if so, otherwise null. Fails open (returns null) if Drive can't be reached
   right now, so editing still works offline. */
async function checkRecordConflict(listKey, id, snapshotRev){
  const remote = await pullRemotePayload();
  if(!remote) return null;
  const rec = (remote[listKey]||[]).find(x=>x.id===id);
  if(rec && (Number(rec._rev)||0) > snapshotRev) return rec;
  return null;
}

  actions.querySelector('#lockBtn').onclick = ()=>{ settingsUnlocked=false; render(); };

  c.innerHTML = `
    <div class="card">
      <h2>Company Details <span class="tag">admin only</span></h2>
      <form id="orgForm">
        <div class="grid cols-2">
          <div class="field"><label>Company Name</label><input type="text" name="companyName" value="${esc(ORG.companyName)}"></div>
          <div class="field"><label>CIN</label><input type="text" name="cin" value="${esc(ORG.cin)}"></div>
          <div class="field"><label>Company PAN</label><input type="text" name="pan" value="${esc(ORG.pan)}"></div>
          <div class="field"><label>TAN</label><input type="text" name="tan" value="${esc(ORG.tan)}"></div>
          <div class="field"><label>Phone</label><input type="text" name="tel" value="${esc(ORG.tel)}"></div>
          <div class="field"><label>Email</label><input type="text" name="email" value="${esc(ORG.email)}"></div>
        </div>
        <div class="field"><label>Registered Address</label><textarea name="address">${esc(ORG.address)}</textarea></div>
        <div class="field">
          <label>Company Logo</label>
          <div class="file-drop" id="logoDrop">${ORG.logo?'Click to replace logo':'Click to upload a logo (PNG/JPG)'}</div>
          <input type="file" id="logoInput" accept="image/*" style="display:none;">
          ${ORG.logo?`<div class="file-chip" style="margin-top:8px;"><img src="${ORG.logo}" style="width:34px;height:34px;object-fit:cover;border-radius:5px;"><span class="fname">Current logo</span><button type="button" id="removeLogo">✕</button></div>`:''}
        </div>
        <div class="section-label">Company Bank Account</div>
        <div class="grid cols-3">
          <div class="field"><label>Bank Name</label><input type="text" name="bankName" value="${esc(ORG.bankName)}"></div>
          <div class="field"><label>Account No.</label><input type="text" name="bankAccNo" value="${esc(ORG.bankAccNo)}"></div>
          <div class="field"><label>IFSC</label><input type="text" name="bankIFSC" value="${esc(ORG.bankIFSC)}"></div>
        </div>
        <div class="field"><label>Branch</label><input type="text" name="bankBranch" value="${esc(ORG.bankBranch)}"></div>
        <div class="btn-row"><button type="submit" class="btn">Save Company Details</button></div>
      </form>
    </div>

    <div class="card">
      <h2>Statutory Calculation Rules</h2>
      <p style="color:var(--muted);font-size:13px;">EPF is 12% of Basic, ESI is 0.75% of gross (applicable up to ₹21,000 gross). Income tax slabs and rates for both regimes are fully editable below, so this stays accurate when the government revises them in a future Budget. Professional Tax uses the slabs below — edit to match your state. These are estimates for reference — verify with your CA before filing.</p>
      <div class="field">
        <label class="checkline"><input type="checkbox" id="pfCeilingChk" ${ORG.applyPfCeiling?'checked':''}> Apply EPF wage ceiling</label>
        <input type="number" id="pfCeilingVal" value="${ORG.pfCeiling||15000}" style="margin-top:6px;max-width:160px;">
      </div>
      <div class="section-label">Professional Tax Slabs (monthly gross, ₹)</div>
      <div id="ptSlabWrap"></div>
      <div class="btn-row" style="margin-top:10px;"><button class="btn secondary sm" id="addSlab">+ Add Slab</button><button class="btn sm" id="saveRules">Save Statutory Rules</button></div>
    </div>

    <div class="card">
      <h2>Income Tax Rules <span class="tag">both regimes, editable</span></h2>
      <p style="color:var(--muted);font-size:13px;">These are the exact rules the payslip tax engine uses. When a Budget changes slabs, thresholds, cess or surcharge, update them here — no code change needed. Slab rows are annual taxable-income brackets; leave the last row's "Up To" blank for "and above". Surcharge rows are annual-income thresholds above which that surcharge rate applies.</p>
      ${['New','Old'].map(regime=>{
        const key = 'tax'+regime, r = ORG[key];
        return `
        <div class="section-label" style="margin-top:${regime==='Old'?'18px':'6px'};">${regime} Regime</div>
        <div class="grid cols-3">
          <div class="field"><label>Standard Deduction (₹/yr)</label><input type="number" step="0.01" min="0" data-taxfield="${key}-stdDeduction" value="${r.stdDeduction}"></div>
          <div class="field"><label>Rebate Threshold — nil tax up to (₹/yr)</label><input type="number" step="0.01" min="0" data-taxfield="${key}-rebateThreshold" value="${r.rebateThreshold}"></div>
          <div class="field"><label>Cess (%)</label><input type="number" step="0.01" min="0" data-taxfield="${key}-cess" value="${(r.cess*100).toFixed(2)}"></div>
        </div>
        <div class="hint" style="margin:-4px 0 6px;">Tax Slabs (annual taxable income, ₹)</div>
        <div data-slabwrap="${key}-slabs"></div>
        <button type="button" class="btn secondary sm" data-addtaxslab="${key}">+ Add Slab</button>
        <div class="hint" style="margin:14px 0 6px;">Surcharge Tiers (annual taxable income above, ₹)</div>
        <div data-slabwrap="${key}-surcharge"></div>
        <button type="button" class="btn secondary sm" data-addsurcharge="${key}">+ Add Surcharge Tier</button>
      `; }).join('')}
      <div class="btn-row" style="margin-top:14px;"><button class="btn sm" id="saveTaxRules">Save Income Tax Rules</button></div>
    </div>

    <div class="card">
      <h2>CTC Structuring Policy</h2>
      <p style="color:var(--muted);font-size:13px;">Governs how "Revise by CTC" turns a single Cost-to-Company figure into a full monthly breakdown: <b>Basic</b> is set as this % of CTC; <b>HRA</b> = 50% of Basic; <b>Children Education</b> is fixed; <b>LTA</b> = Basic ÷ 12; <b>PF Employee</b> and <b>PF Employer</b> are each 12% of Basic (or the capped wage, per the ceiling setting above); <b>Professional Tax</b> follows the slabs above; and <b>Other Allowance</b> is the balancing figure that makes everything reconcile exactly back to the CTC entered. This mirrors how your management structures pay — adjust the ratio to match company policy.</p>
      <div class="grid cols-3">
        <div class="field"><label>Basic as % of CTC</label><input type="number" step="0.01" min="1" max="99" id="basicPctField" value="${(ORG.ctcPolicy.basicPct*100).toFixed(2)}"></div>
        <div class="field"><label>Children Education (₹/month, fixed)</label><input type="number" step="0.01" min="0" id="childEduField" value="${ORG.ctcPolicy.childrenEducation}"></div>
        <div class="field"><label>Default Reimbursement (₹/month)</label><input type="number" step="0.01" min="0" id="defReimbField" value="${ORG.ctcPolicy.defaultReimbursement}"></div>
      </div>
      <div class="btn-row"><button class="btn sm" id="saveCtcPolicy">Save CTC Policy</button></div>
    </div>

    <div class="card">
      <h2>Salary Revision <span class="tag">admin only</span></h2>
      <p style="color:var(--muted);font-size:13px;">Every revision is recorded with its effective month and reason, and past entries can never be altered. Payslips automatically use whichever salary version was in force for the period being generated.</p>
      ${EMPLOYEES.length ? `
        <table><thead><tr><th>Employee</th><th>Current Gross</th><th>Regime</th><th>Effective From</th><th>Revisions</th><th></th></tr></thead><tbody>
        ${EMPLOYEES.map(e=>{ const s = currentSalary(e); const g = grossOf(s); return `<tr>
          <td><b>${esc(e.name)}</b><div style="color:var(--muted);font-size:11.5px;">${esc(e.empCode)}</div></td>
          <td class="num-cell">${money(g)}</td>
          <td><span class="pill ${s.taxRegime==='old'?'bad':'good'}">${s.taxRegime==='old'?'Old':'New'}</span></td>
          <td>${esc(s.effectiveFrom||'—')}</td>
          <td>${(e.salaryHistory||[]).length}</td>
          <td><button class="btn sm" data-revise="${e.id}">↻ Revise Salary</button></td>
        </tr>`; }).join('')}
        </tbody></table>
      ` : '<div class="empty" style="padding:16px;">No employees yet — add one from the Staff tab.</div>'}
    </div>

    <div class="card">
      <h2>Admin Password</h2>
      <form id="pwForm">
        <div class="grid cols-2">
          <div class="field"><label>Current Password</label><input type="password" name="cur" required></div>
          <div class="field"><label>New Password</label><input type="password" name="nw" required></div>
        </div>
        <div class="btn-row"><button type="submit" class="btn secondary">Change Password</button></div>
      </form>
    </div>

    <div class="card">
      <h2>Working as</h2>
      <p style="color:var(--muted);font-size:13px;">Since a few of you may use this app at the same time, your name is tagged on the changes you make. This is how the app knows whose edit is newest if two people touch the same record, and who to name in a conflict warning.</p>
      <div class="field" style="max-width:280px;"><label>Your Name</label><input type="text" id="staffNameField" value="${esc(currentStaffName())}" placeholder="e.g. Priya"></div>
      <button class="btn secondary sm" id="saveStaffName">Save Name</button>
      ${(()=>{ const la = lastActivity(); return la ? `<div class="hint" style="margin-top:10px;">Most recent change anywhere: <b>${esc(la.by)}</b> · ${esc(timeAgo(la.at))}</div>` : ''; })()}
    </div>

    <div class="card">
      <h2>Google Drive Backup &amp; Sync</h2>
      <p style="color:var(--muted);font-size:13px;">Connects this app (hosted on GitHub Pages) to a folder in <b>your own</b> Google Drive. <code>data.json</code> there is kept live — synced a few seconds after any change, and automatically every <b>20 seconds</b> as a backstop, so it stays current across every window/tab you have this app open in. The same sync also keeps a <b>Google Sheet</b> up to date, with one tab each for Employees, Salary History, Payslips and Compliance. "Backup Now" additionally keeps a rolling set of the <b>last 5</b> dated JSON snapshots you can restore from. See README.md for the one-time Google Cloud setup. This app only ever touches files/folders it creates — nothing else in your Drive.</p>
      <div class="field"><label>Google OAuth Client ID</label><input type="text" id="gClientId" placeholder="xxxxxxxxxx.apps.googleusercontent.com" value="${esc(ORG.gdrive.clientId||'')}"></div>
      <div class="btn-row" style="margin-bottom:10px;">
        <button class="btn secondary sm" id="saveClientId">Save Client ID</button>
        ${driveConnected() ? '<button class="btn sm" id="disconnectDrive">Disconnect</button>' : '<button class="btn sm" id="connectDriveBtn">Connect Google Drive</button>'}
      </div>
      ${driveConnected() ? `
        <div style="font-size:13px;color:var(--muted);margin-bottom:10px;" id="driveLastSync">${ORG.gdrive.lastSynced?('Last synced '+new Date(ORG.gdrive.lastSynced).toLocaleString('en-IN')+' · auto-syncs every 20s'):'Not yet synced'}</div>
        <div class="btn-row" style="margin-bottom:10px;">
          <button class="btn sm" id="driveBackupBtn">⬆ Backup Now to Drive</button>
          <button class="btn secondary sm" id="driveSheetBtn">📊 Sync Google Sheet Now</button>
          ${ORG.gdrive.sheetId ? `<a class="btn secondary sm" href="https://docs.google.com/spreadsheets/d/${ORG.gdrive.sheetId}/edit" target="_blank" rel="noopener">↗ Open Sheet</a>` : ''}
        </div>
        <div class="section-label">Last 5 Backups in Drive</div>
        <div id="driveBackupList"><div class="empty" style="padding:12px;">Loading…</div></div>
      ` : `<div style="font-size:13px;color:var(--muted);">Not connected. Paste a Client ID and click Connect to begin.</div>`}
    </div>
  `;
  document.getElementById('orgForm').onsubmit = async (ev)=>{
    ev.preventDefault(); const fd = new FormData(ev.target);
    ['companyName','cin','pan','tan','tel','email','address','bankName','bankAccNo','bankIFSC','bankBranch'].forEach(k=> ORG[k] = fd.get(k) ? fd.get(k).trim() : '');
    await saveOrg(); refreshBrand(); toast('Company details saved.');
  };
  const logoDrop = document.getElementById('logoDrop'); logoDrop.onclick = ()=> document.getElementById('logoInput').click();
  document.getElementById('logoInput').onchange = async (e)=>{
    const f = e.target.files[0]; if(!f) return; const res = await readFileAsDataURL(f);
    ORG.logo = res.data; await saveOrg(); refreshBrand(); toast('Logo updated.'); renderSettings(c,actions);
  };
  const rmLogo = document.getElementById('removeLogo');
  if(rmLogo) rmLogo.onclick = async ()=>{ ORG.logo=''; await saveOrg(); refreshBrand(); renderSettings(c,actions); };

  function drawSlabs(){
    document.getElementById('ptSlabWrap').innerHTML = ORG.ptSlabs.map((s,i)=>`
      <div class="grid cols-3" style="align-items:end;margin-bottom:6px;">
        <div class="field" style="margin-bottom:0;"><label>Min</label><input type="number" data-slab="${i}-min" value="${s.min}"></div>
        <div class="field" style="margin-bottom:0;"><label>Max</label><input type="number" data-slab="${i}-max" value="${s.max}"></div>
        <div class="field" style="margin-bottom:0;display:flex;gap:6px;align-items:end;"><input type="number" step="0.01" data-slab="${i}-amount" value="${s.amount}" style="flex:1;"><button type="button" class="btn danger sm" data-rmslab="${i}">✕</button></div>
      </div>`).join('');
    document.querySelectorAll('[data-rmslab]').forEach(b=>b.onclick=()=>{ ORG.ptSlabs.splice(Number(b.dataset.rmslab),1); drawSlabs(); });
  }
  drawSlabs();
  document.getElementById('addSlab').onclick = ()=>{ ORG.ptSlabs.push({min:0,max:0,amount:0}); drawSlabs(); };
  document.getElementById('saveRules').onclick = async ()=>{
    document.querySelectorAll('[data-slab]').forEach(inp=>{ const [i,field] = inp.dataset.slab.split('-'); ORG.ptSlabs[Number(i)][field] = Number(inp.value)||0; });
    ORG.applyPfCeiling = document.getElementById('pfCeilingChk').checked;
    ORG.pfCeiling = Number(document.getElementById('pfCeilingVal').value)||15000;
    await saveOrg(); toast('Statutory rules saved.');
  };

  /* ---- Income Tax Rules editor (slabs + surcharge tiers, per regime) ---- */
  function drawTaxSlabs(key){
    const wrap = document.querySelector(`[data-slabwrap="${key}-slabs"]`); if(!wrap) return;
    wrap.innerHTML = ORG[key].slabs.map((pair,i)=>`
      <div class="grid cols-3" style="align-items:end;margin-bottom:6px;">
        <div class="field" style="margin-bottom:0;"><label>Up To (₹, blank = above)</label><input type="number" step="0.01" data-taxslab="${key}-${i}-cap" value="${pair[0]===null?'':pair[0]}"></div>
        <div class="field" style="margin-bottom:0;"><label>Rate (%)</label><input type="number" step="0.01" data-taxslab="${key}-${i}-rate" value="${(pair[1]*100).toFixed(2)}"></div>
        <div class="field" style="margin-bottom:0;"><button type="button" class="btn danger sm" data-rmtaxslab="${key}-${i}">✕ Remove</button></div>
      </div>`).join('');
    wrap.querySelectorAll('[data-rmtaxslab]').forEach(b=>{
      b.onclick = ()=>{ const [k,idx] = [b.dataset.rmtaxslab.slice(0,b.dataset.rmtaxslab.lastIndexOf('-')), b.dataset.rmtaxslab.split('-').pop()]; ORG[k].slabs.splice(Number(idx),1); drawTaxSlabs(k); };
    });
  }
  function drawSurcharge(key){
    const wrap = document.querySelector(`[data-slabwrap="${key}-surcharge"]`); if(!wrap) return;
    wrap.innerHTML = ORG[key].surcharge.map((pair,i)=>`
      <div class="grid cols-3" style="align-items:end;margin-bottom:6px;">
        <div class="field" style="margin-bottom:0;"><label>Income Above (₹)</label><input type="number" step="0.01" data-surtier="${key}-${i}-threshold" value="${pair[0]}"></div>
        <div class="field" style="margin-bottom:0;"><label>Surcharge Rate (%)</label><input type="number" step="0.01" data-surtier="${key}-${i}-rate" value="${(pair[1]*100).toFixed(2)}"></div>
        <div class="field" style="margin-bottom:0;"><button type="button" class="btn danger sm" data-rmsurtier="${key}-${i}">✕ Remove</button></div>
      </div>`).join('');
    wrap.querySelectorAll('[data-rmsurtier]').forEach(b=>{
      b.onclick = ()=>{ const idx = b.dataset.rmsurtier.split('-').pop(); ORG[key].surcharge.splice(Number(idx),1); drawSurcharge(key); };
    });
  }
  ['taxNew','taxOld'].forEach(k=>{ drawTaxSlabs(k); drawSurcharge(k); });
  document.querySelectorAll('[data-addtaxslab]').forEach(b=> b.onclick = ()=>{ ORG[b.dataset.addtaxslab].slabs.push([null,0]); drawTaxSlabs(b.dataset.addtaxslab); });
  document.querySelectorAll('[data-addsurcharge]').forEach(b=> b.onclick = ()=>{ ORG[b.dataset.addsurcharge].surcharge.push([0,0]); drawSurcharge(b.dataset.addsurcharge); });
  document.getElementById('saveTaxRules').onclick = async ()=>{
    ['taxNew','taxOld'].forEach(key=>{
      const std = document.querySelector(`[data-taxfield="${key}-stdDeduction"]`);
      const reb = document.querySelector(`[data-taxfield="${key}-rebateThreshold"]`);
      const cs  = document.querySelector(`[data-taxfield="${key}-cess"]`);
      if(std) ORG[key].stdDeduction = Number(std.value)||0;
      if(reb) ORG[key].rebateThreshold = Number(reb.value)||0;
      if(cs) ORG[key].cess = (Number(cs.value)||0)/100;
      document.querySelectorAll(`[data-taxslab^="${key}-"]`).forEach(inp=>{
        const parts = inp.dataset.taxslab.split('-'); const idx = Number(parts[1]); const field = parts[2];
        const v = inp.value.trim();
        if(field==='cap') ORG[key].slabs[idx][0] = v==='' ? null : Number(v);
        else ORG[key].slabs[idx][1] = (Number(v)||0)/100;
      });
      document.querySelectorAll(`[data-surtier^="${key}-"]`).forEach(inp=>{
        const parts = inp.dataset.surtier.split('-'); const idx = Number(parts[1]); const field = parts[2];
        if(field==='threshold') ORG[key].surcharge[idx][0] = Number(inp.value)||0;
        else ORG[key].surcharge[idx][1] = (Number(inp.value)||0)/100;
      });
    });
    await saveOrg(); toast('Income tax rules saved.');
  };

  const saveCtcBtn = document.getElementById('saveCtcPolicy');
  if(saveCtcBtn) saveCtcBtn.onclick = async ()=>{
    ORG.ctcPolicy.basicPct = Math.min(0.99, Math.max(0.01, (Number(document.getElementById('basicPctField').value)||50)/100));
    ORG.ctcPolicy.childrenEducation = Number(document.getElementById('childEduField').value)||0;
    ORG.ctcPolicy.defaultReimbursement = Number(document.getElementById('defReimbField').value)||0;
    await saveOrg(); toast('CTC policy saved.');
  };
  document.getElementById('pwForm').onsubmit = async (ev)=>{
    ev.preventDefault(); const fd = new FormData(ev.target);
    const curHash = await sha256(fd.get('cur'));
    if(curHash !== ORG.adminPasswordHash){ toast('Current password is incorrect.', true); return; }
    ORG.adminPasswordHash = await sha256(fd.get('nw')); await saveOrg(); ev.target.reset(); toast('Password changed.');
  };
  c.querySelectorAll('[data-revise]').forEach(b=> b.onclick = ()=> openReviseSalary(b.dataset.revise));
  const saveNameBtn = document.getElementById('saveStaffName');
  if(saveNameBtn) saveNameBtn.onclick = ()=>{
    const v = document.getElementById('staffNameField').value.trim();
    if(!v){ toast('Please enter a name.', true); return; }
    setStaffName(v); toast('Name saved.');
  };
  document.getElementById('saveClientId').onclick = async ()=>{    ORG.gdrive.clientId = document.getElementById('gClientId').value.trim();
    gisTokenClient = null; await saveOrg(); toast('Client ID saved.');
  };
  const connectBtn = document.getElementById('connectDriveBtn');
  if(connectBtn) connectBtn.onclick = connectDrive;
  const disconnectBtn = document.getElementById('disconnectDrive');
  if(disconnectBtn) disconnectBtn.onclick = disconnectDrive;
  const backupBtn = document.getElementById('driveBackupBtn');
  if(backupBtn) backupBtn.onclick = driveBackupNow;
  const sheetBtn = document.getElementById('driveSheetBtn');
  if(sheetBtn) sheetBtn.onclick = ()=> driveExportSheet(false);
  const backupListEl = document.getElementById('driveBackupList');
  if(backupListEl){
    driveListBackups().then(files=>{
      if(!document.getElementById('driveBackupList')) return;
      if(!files.length){ backupListEl.innerHTML = '<div class="empty" style="padding:12px;">No backups yet — click "Backup Now to Drive".</div>'; return; }
      backupListEl.innerHTML = files.map(f=>`
        <div class="file-chip">
          <span class="fname">${esc(f.name)} <span style="color:var(--muted);">— ${new Date(f.createdTime).toLocaleString('en-IN')}</span></span>
          <button type="button" class="btn secondary sm" data-restore="${f.id}" data-label="${esc(f.name)}">Restore</button>
        </div>`).join('');
      backupListEl.querySelectorAll('[data-restore]').forEach(b=>{
        b.onclick = ()=> driveRestoreBackup(b.dataset.restore, b.dataset.label);
      });
    }).catch(()=>{ if(document.getElementById('driveBackupList')) backupListEl.innerHTML = '<div class="empty" style="padding:12px;">Could not load backups.</div>'; });
  }
}

/* ============================= INIT ============================= */
(async function init(){
  await loadAll();
  for(const e of EMPLOYEES){ await loadCompliance(e.id); }
  updateCompBadge();
  setTab('dashboard');
  if(ORG.gdrive && ORG.gdrive.connected){ attemptSilentDriveReconnect(); startAutoSyncLoop(); ensureStaffName(); }
})();
</script>
</body>
</html>
